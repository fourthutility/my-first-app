<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0a0a0f;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:16px;max-width:800px;margin:0 auto;min-height:100vh}

  .card{background:#0f1117;border:1px solid #1e2433;border-radius:10px;padding:18px;margin-bottom:14px}

  td{padding:6px 8px;border-bottom:1px solid #0f1117;color:#94a3b8}
  .company-card{padding:14px;background:#0a0f0a;border:1px solid #1a3a1a;border-radius:8px;margin-bottom:10px}
  .contact-chip{margin-top:6px;padding:6px 10px;background:#0a0a14;border-radius:6px;font-size:12px}
  .q-row{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid #0f1117;font-size:13px;color:#cbd5e1}
  .spinner{width:40px;height:40px;border:3px solid #1a2a1a;border-top-color:#4ade80;border-radius:50%;animation:spin 0.8s linear infinite;margin:80px auto}

  .error{text-align:center;padding:60px 20px;color:#f87171}
  .badge{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:10px;margin-bottom:20px}
  .powered{font-size:10px;color:#334155;text-align:right;margin-top:8px;padding-top:12px;border-top:1px solid #1e2433}

  @media(min-width:640px){body{padding:24px}}
  @media print{body{background:#fff;color:#000;padding:16px}.card{border-color:#ddd;background:#fff}.card-title,.field label{color:#666}.field span,.report,.q-row{color:#000}.company-card{border-color:#ddd;background:#f9f9f9}}

<body>

<div id="root"><div class="spinner"></div></div>

<script>
// NC SOS search — copies cleaned name to clipboard, opens search page in new tab
// (NC SOS uses Cloudflare + session cookies; auto-submit can't work cross-origin)
function sosSearch(entityName) {
  const term = (entityName||'').replace(/\s+(LLC|LP|L\.P\.|LLP|LLLP|Inc\.?|Corp\.?|Co\.?|Ltd\.?|PLLC)\s*$/i,'').replace(/\s+(Properties|Property|Holdings|Realty|Ventures|Group)\s*$/i,'').trim() || entityName || '';
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(term).catch(()=>{});
  }
  const note = document.createElement('div');
  note.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#e8e8f0;padding:10px 20px;border-radius:8px;font-size:13px;z-index:99999;box-shadow:0 4px 16px rgba(0,0,0,.5);pointer-events:none';
  note.textContent = '📋 Copied! In the NC SOS tab, paste (⌘V or Ctrl+V) and hit Search → ' + term;
  document.body.appendChild(note);
  setTimeout(() => note.remove(), 5000);
  window.open('https://www.sosnc.gov/online_services/search/by_title/search_Business_Registration', '_blank');
}

// ── Contact enrichment globals (defined here so innerHTML injection isn't needed) ──
var CONTACT_SEARCH_URL='https://lnldwxttyfjmaobluciy.supabase.co/functions/v1/contact-search';
function _ibEnrichCfg(){var w=document.getElementById('ibEnrichWrap');return w?w.dataset:{};}
function ibEnrichShow(){document.getElementById('ibEnrichTrigger').style.display='none';document.getElementById('ibEnrichPanel').style.display='block';var inp=document.getElementById('ibEnrichCompany');if(inp&&!inp.value)inp.value=_ibEnrichCfg().company||'';}
function ibEnrichCancel(){document.getElementById('ibEnrichPanel').style.display='none';document.getElementById('ibEnrichTrigger').style.display='block';}
async function ibEnrichSearch(){
  var cfg=_ibEnrichCfg(),name=document.getElementById('ibEnrichCompany').value.trim();
  var domainEl=document.getElementById('ibEnrichDomain');var domain=domainEl?domainEl.value.trim().replace(/^https?:\/\//,'').replace(/\/.*/,''):'';
  if(!name){alert('Enter a name first');return;}
  var isPerson=window._ibPersonSearch||false;
  var btn=document.getElementById('ibEnrichSearchBtn');btn.disabled=true;btn.textContent='Searching...';
  document.getElementById('ibEnrichResults').innerHTML='<div style="text-align:center;padding:16px;color:#475569;font-size:12px">'+(isPerson?'Searching for person in HubSpot & Apollo...':'Checking HubSpot then Apollo...')+'</div>';
  try{
    var payload=isPerson?{person_name:name}:{company_name:name};
    if(domain&&!isPerson)payload.domain=domain;
    var res=await fetch(CONTACT_SEARCH_URL,{method:'POST',headers:{'Content-Type':'application/json','x-app-secret':cfg.secret},body:JSON.stringify(payload)});
    var data=await res.json();
    if(!res.ok){document.getElementById('ibEnrichResults').innerHTML='<div style="color:#f87171;font-size:12px;padding:8px">Search failed ('+res.status+'): '+(data.error||'Server error')+'</div>';return;}
    ibEnrichRenderSearch(data,name);
  }catch(e){document.getElementById('ibEnrichResults').innerHTML='<div style="color:#f87171;font-size:12px;padding:8px">Search failed: '+e.message+'</div>';}
  finally{btn.disabled=false;btn.textContent='Run Free Search →';window._ibPersonSearch=false;}
}
function ibEnrichRenderSearch(data,company){
  var html='';
  var contacts=data.contacts||[];
  var pending=data.pending_reveal||[];
  var hsContacts=contacts.filter(function(c){return c.source==='HubSpot';});
  var apolloCached=contacts.filter(function(c){return c.source==='Apollo';});
  var hsPid=data.hs_portal_id||'';
  if(hsPid)window._ibHsPortalId=hsPid; // cache for Known Contacts HubSpot badges
  if(hsContacts.length){
    html+='<div style="font-size:10px;color:#4ade80;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">✅ HubSpot ('+hsContacts.length+')</div>';
    hsContacts.forEach(function(c){
      var hsLink=hsPid&&c.hubspot_contact_id?'<a href="https://app.hubspot.com/contacts/'+hsPid+'/contact/'+c.hubspot_contact_id+'" target="_blank" rel="noopener" style="font-size:9px;color:#ff7a59;background:#2d1a13;border:1px solid #7c3d2a;border-radius:4px;padding:1px 6px;text-decoration:none;margin-left:6px">HubSpot →</a>':'';
      html+='<div style="background:#051207;border-radius:6px;padding:8px 10px;margin-bottom:5px;border:1px solid #14532d"><div style="font-size:12px;font-weight:700;color:#e2e8f0;display:flex;align-items:center;flex-wrap:wrap;gap:4px">'+c.name+(c.title?' · <span style="color:#94a3b8;font-weight:400">'+c.title+'</span>':'')+hsLink+'</div>'+(c.email?'<div style="font-size:11px;color:#64748b"><a href="mailto:'+c.email+'" style="color:#64748b;text-decoration:none">✉ '+c.email+'</a></div>':'')+(c.phone?'<div style="font-size:11px;color:#64748b"><a href="tel:'+c.phone+'" style="color:#64748b;text-decoration:none">📞 '+c.phone+'</a></div>':'')+(c.linkedin_url?'<a href="'+c.linkedin_url+'" target="_blank" style="font-size:11px;color:#818cf8;text-decoration:none">🔗 LinkedIn →</a>':'')+'</div>';
    });
  } else { html+='<div style="font-size:11px;color:#475569;margin-bottom:8px">HubSpot: no matches</div>'; }
  if(apolloCached.length){
    html+='<div style="font-size:10px;color:#94a3b8;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin:10px 0 6px">✅ Apollo — cached ('+apolloCached.length+')</div>';
    apolloCached.forEach(function(c){var hasInfo=c.email||c.phone||c.linkedin_url;var bg=hasInfo?'#051207':'#0a0a14';var border=hasInfo?'#14532d':'#334155';html+='<div style="background:'+bg+';border-radius:6px;padding:8px 10px;margin-bottom:5px;border:1px solid '+border+'"><div style="font-size:12px;font-weight:700;color:#e2e8f0">'+c.name+(c.title?' · <span style="color:#94a3b8;font-weight:400">'+c.title+'</span>':'')+'</div>'+(c.email?'<div style="font-size:11px;color:#64748b"><a href="mailto:'+c.email+'" style="color:#64748b;text-decoration:none">✉ '+c.email+'</a></div>':'')+(c.phone?'<div style="font-size:11px;color:#64748b"><a href="tel:'+c.phone+'" style="color:#64748b;text-decoration:none">📞 '+c.phone+'</a></div>':'')+(c.linkedin_url?'<a href="'+c.linkedin_url+'" target="_blank" style="font-size:11px;color:#818cf8;text-decoration:none">🔗 LinkedIn →</a>':'')+'</div>';});
  }
  if(pending.length){
    html+='<div id="ibApolloList" style="margin-top:10px">';
    html+='<div style="font-size:10px;color:#fbbf24;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">⚡ Apollo — '+pending.length+' contact'+(pending.length!==1?'s':'')+' pending reveal</div>';
    pending.forEach(function(p,i){html+='<label style="display:flex;align-items:center;gap:7px;padding:4px 6px;border-radius:4px;cursor:pointer;margin-bottom:3px;background:rgba(251,191,36,0.06);border:1px solid rgba(251,191,36,0.15)"><input type="checkbox" data-idx="'+i+'" checked onchange="ibEnrichUpdateBtn()" style="accent-color:#fbbf24;cursor:pointer;flex-shrink:0"><span style="font-size:12px;font-weight:600;color:#e2e8f0">'+p.first_name+(p.last_name?' '+p.last_name:'')+'</span>'+(p.title?'<span style="font-size:11px;opacity:0.55;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+p.title+'</span>':'')+'</label>';});
    html+='<div style="margin-top:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap"><button id="ibRevealBtn" onclick="ibEnrichReveal()" style="padding:7px 14px;border-radius:18px;font-size:12px;font-weight:600;background:#052e16;border:1px solid #166534;color:#4ade80;cursor:pointer">Reveal '+pending.length+' of '+pending.length+' (no phone)</button><button onclick="ibEnrichToggleAll()" id="ibToggleAllBtn" style="background:none;border:none;font-size:11px;color:#94a3b8;cursor:pointer;text-decoration:underline;padding:0">Deselect all</button><span style="font-size:10px;color:#475569">email + LinkedIn per contact</span></div>';
    html+='</div>';
    window._ibPendingReveal=pending;window._ibEnrichCompany=company;
  } else if(!hsContacts.length&&!apolloCached.length){ html+='<div style="font-size:11px;color:#475569">No contacts found. Try a different company name.</div>'; }
  document.getElementById('ibEnrichResults').innerHTML=html;
}
function ibEnrichUpdateBtn(){
  var total=window._ibPendingReveal?window._ibPendingReveal.length:0;
  var n=document.querySelectorAll('#ibApolloList input[type=checkbox]:checked').length;
  var btn=document.getElementById('ibRevealBtn');
  var tog=document.getElementById('ibToggleAllBtn');
  if(!btn)return;
  btn.textContent=n>0?'Reveal '+n+(n<total?' of '+total:'')+' (no phone)':'Select contacts above';
  btn.disabled=n===0;btn.style.color=n?'#4ade80':'#94a3b8';
  if(tog)tog.textContent=n===total?'Deselect all':'Select all';
}
function ibEnrichToggleAll(){
  var boxes=document.querySelectorAll('#ibApolloList input[type=checkbox]');
  var allChecked=Array.from(boxes).every(function(b){return b.checked;});
  boxes.forEach(function(b){b.checked=!allChecked;});
  ibEnrichUpdateBtn();
}
async function ibEnrichReveal(){
  var cfg=_ibEnrichCfg();
  var pending=window._ibPendingReveal||[];
  var company=window._ibEnrichCompany||document.getElementById('ibEnrichCompany').value.trim();
  var domainEl=document.getElementById('ibEnrichDomain');var domain=domainEl?domainEl.value.trim().replace(/^https?:\/\//,'').replace(/\/.*/,''):'';
  if(!pending.length)return;
  var checkedIdxs=new Set(Array.from(document.querySelectorAll('#ibApolloList input[type=checkbox]:checked')).map(function(b){return Number(b.dataset.idx);}));
  var toReveal=checkedIdxs.size>0?pending.filter(function(_,i){return checkedIdxs.has(i);}):pending;
  if(!toReveal.length)return;
  var count=toReveal.length;
  if(!confirm('Use '+count+' Apollo credit'+(count!==1?'s':'')+' to reveal email & LinkedIn for '+count+' contact'+(count!==1?'s':'')+'. Continue?'))return;
  var btn=document.getElementById('ibRevealBtn');btn.disabled=true;btn.textContent='Revealing...';
  try{
    var payload={company_name:company,reveal_ids:toReveal,project_id:cfg.pid};if(domain)payload.domain=domain;
    var res=await fetch(CONTACT_SEARCH_URL,{method:'POST',headers:{'Content-Type':'application/json','x-app-secret':cfg.secret},body:JSON.stringify(payload)});
    var data=await res.json();ibEnrichRenderRevealed(data.contacts||[],data.empty_reveals||0);
    window._ibPendingReveal=pending.filter(function(_,i){return !checkedIdxs.has(i);});
  }catch(e){btn.disabled=false;btn.textContent='Retry';alert('Reveal failed: '+e.message);}
}
function ibEnrichRenderRevealed(contacts,emptyCount){
  var list=document.getElementById('ibApolloList');
  if(list){var html='<div style="font-size:10px;color:#4ade80;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">✅ Revealed ('+contacts.length+' contact'+(contacts.length!==1?'s':'')+')</div>';contacts.forEach(function(c){var hasInfo=c.email||c.phone||c.linkedin_url;var bg=hasInfo?'#051207':'#0a0a14';var border=hasInfo?'#14532d':'#334155';html+='<div style="background:'+bg+';border-radius:6px;padding:8px 10px;margin-bottom:5px;border:1px solid '+border+'"><div style="font-size:12px;font-weight:700;color:#e2e8f0">'+c.name+(c.title?' · <span style="color:#94a3b8;font-weight:400">'+c.title+'</span>':'')+(hasInfo?'':'<span style="font-size:10px;color:#fbbf24;margin-left:6px">no info found</span>')+'</div>'+(c.email?'<div style="font-size:11px;color:#64748b"><a href="mailto:'+c.email+'" style="color:#64748b;text-decoration:none">✉ '+c.email+'</a></div>':'')+(c.phone?'<div style="font-size:11px;color:#64748b"><a href="tel:'+c.phone+'" style="color:#64748b;text-decoration:none">📞 '+c.phone+'</a></div>':'')+(c.linkedin_url?'<a href="'+c.linkedin_url+'" target="_blank" style="font-size:11px;color:#818cf8;text-decoration:none">🔗 LinkedIn →</a>':'')+'</div>';});list.outerHTML=html;}
  var rb=document.getElementById('ibRevealBtn');if(rb&&rb.parentElement)rb.parentElement.innerHTML='<div style="font-size:11px;color:#4ade80;margin-top:4px">✓ Contacts saved to report'+(emptyCount?' <span style="color:#fbbf24">('+emptyCount+' returned no info — not saved)</span>':'')+'</div>';
}
// Heuristic: does this look like a person's name rather than a company?
function ibLooksLikePerson(name){
  return !/\b(LLC|Inc\.?|Corp\.?|Ltd\.?|PLLC|LLP|Construction|Electric(al)?|Mechanical|Plumb(ing)?|Contractor|Controls?|Services?|Group|Associates?|Consulting|Solutions?|Technologies?|Systems?|Company|Enterprises?|Partners?|Realty|Properties?|Equipment|Supply|Management|Industries|Fire|Security|Automation|Integrated|Networks?|Communications?|Energy|Commercial|Industrial|Roofing|Flooring|HVAC|Builders?|Developers?|Development|Design|Engineering|Engineers?)\b/i.test(name);
}
// Open enrich panel, pre-fill name, auto-search — called from contractor badge clicks
// Automatically detects person vs company and routes the search accordingly
function ibEnrichFromContractor(name,companyHint){
  var companyEl=document.getElementById('ibEnrichCompany');
  if(!companyEl){alert('Scroll to the "Find Contacts" section and search manually for: '+name);return;}
  // If we have a company hint (contractor_company from permit), use it; else detect
  var searchName=companyHint||name;
  var isPerson=!companyHint&&ibLooksLikePerson(name);
  companyEl.value=searchName;
  var domainEl=document.getElementById('ibEnrichDomain');if(domainEl)domainEl.value='';
  window._ibPersonSearch=isPerson;
  var trigger=document.getElementById('ibEnrichTrigger');var panel=document.getElementById('ibEnrichPanel');
  if(trigger&&trigger.style.display!=='none'){trigger.style.display='none';if(panel)panel.style.display='block';}
  companyEl.scrollIntoView({behavior:'smooth',block:'center'});
  setTimeout(function(){ibEnrichSearch();},300);
}

function ibToggleStoryboard(btn) {
  var bd = document.getElementById('ib-bd-panel');
  var sb = document.getElementById('ib-storyboard-panel');
  var on = sb && sb.style.display === 'none';
  if (sb) sb.style.display = on ? 'block' : 'none';
  if (bd) bd.style.display = on ? 'none' : 'block';
  btn.textContent = on ? '📊 BD Report' : '📋 Storyboard';
}

function ibEmailStoryboard() {
  // Grab the rendered storyboard card (the white inner div)
  var panel = document.getElementById('ib-storyboard-panel');
  if (!panel) { alert('No storyboard available for this report.'); return; }
  var card = panel.querySelector('div');
  if (!card) { alert('Storyboard not rendered yet.'); return; }

  // Build a clean, email-safe HTML document around the card
  var cardHtml = card.outerHTML;
  var emailHtml = [
    '<!DOCTYPE html><html><head><meta charset="utf-8"></head><body style="margin:0;padding:24px 0;background:#f1f5f9;font-family:-apple-system,BlinkMacSystemFont,\'Segoe UI\',sans-serif">',
    '<div style="max-width:600px;margin:0 auto">',
    cardHtml,
    '<p style="font-size:11px;color:#94a3b8;text-align:center;margin-top:16px">Powered by Intelligent Buildings &middot; intelligentbuildings.com</p>',
    '</div></body></html>'
  ].join('');

  // Copy as rich text (text/html) so Gmail/Outlook render it styled, not as raw code
  var copied = false;
  if (window.ClipboardItem && navigator.clipboard && navigator.clipboard.write) {
    var blob = new Blob([emailHtml], { type: 'text/html' });
    navigator.clipboard.write([new ClipboardItem({ 'text/html': blob })]).then(function() {
      _ibShowEmailToast();
    }).catch(function() {
      // Fallback: copy plain text version
      _ibCopyStoryboardText();
    });
    return;
  }
  // Older browser fallback
  _ibCopyStoryboardText();
}

function _ibCopyStoryboardText() {
  var panel = document.getElementById('ib-storyboard-panel');
  var text = panel ? panel.innerText : '';
  navigator.clipboard.writeText(text).then(_ibShowEmailToast).catch(function(){
    prompt('Copy this storyboard text:', text);
  });
}

function _ibShowEmailToast() {
  var t = document.createElement('div');
  t.style.cssText = 'position:fixed;top:64px;left:50%;transform:translateX(-50%);background:#0f172a;color:#4ade80;padding:12px 22px;border-radius:10px;font-size:13px;font-weight:600;z-index:99999;box-shadow:0 4px 20px rgba(0,0,0,.5);pointer-events:none;white-space:nowrap;border:1px solid rgba(74,222,128,0.3)';
  t.textContent = '✓ Storyboard copied — paste directly into Gmail or Outlook';
  document.body.appendChild(t);
  setTimeout(function() { t.remove(); }, 4000);
}

// ── Shared progress overlay + async polling (used by ibReScout and load) ─────
// Phase-driven (server PATCHes scout_jobs.phase as the pipeline progresses).
// Replaces the previous timer-driven sigmoid that lied about progress and
// died silently when iOS Safari throttled the long fetch.
var SCOUT_PHASE_MAP = {
  'queued':       { doneThru: -1, active: 0,  ceiling: 8  },
  'geocoding':    { doneThru: -1, active: 0,  ceiling: 12 },
  'attom':        { doneThru: 0,  active: 1,  ceiling: 28 },
  'haiku':        { doneThru: 1,  active: 2,  ceiling: 42 },
  'supplemental': { doneThru: 1,  active: 2,  active2: 3, ceiling: 60 },
  'sonnet':       { doneThru: 3,  active: 4,  active2: 5, ceiling: 95 },
  'done':         { doneThru: 5,  active: -1, ceiling: 100 },
};

function showScoutOverlay(titleText) {
  if (!document.getElementById('rs-kf')) {
    var s = document.createElement('style'); s.id='rs-kf';
    s.textContent='@keyframes rs-spin{to{transform:rotate(360deg)}}';
    document.head.appendChild(s);
  }
  var labels = ['Locating & verifying property','Pulling ownership, sale & building records','Fetching county record, permit history & aerial','Estimating energy cost & cybersecurity exposure','Building BD report + Stakeholder Storyboard','Searching for recent ownership & market news'];
  var ov = document.createElement('div');
  ov.id = 'rs-overlay';
  ov.style.cssText = 'position:fixed;inset:0;z-index:99999;background:#0a0a0f;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:32px 24px;overflow-y:auto';
  ov.innerHTML = '<div style="font-size:15px;font-weight:600;color:#e2e8f0;text-align:center;max-width:320px;line-height:1.45">🔭 ' + titleText + '</div>'
    + '<div style="width:100%;max-width:320px;height:6px;background:#1e2a1e;border-radius:3px;overflow:hidden"><div id="rs-bar" style="height:100%;width:0%;background:linear-gradient(90deg,#16a34a,#4ade80);border-radius:3px;transition:width 0.6s ease"></div></div>'
    + '<div id="rs-pct" style="font-size:12px;color:#4ade80;margin-top:-4px">0%</div>'
    + '<div style="display:flex;flex-direction:column;gap:10px;width:100%;max-width:320px">'
    + labels.map(function(l,i){ return '<div id="rs-s'+i+'" style="font-size:12px;display:flex;align-items:center;gap:10px;color:#475569">'
        + '<span id="rs-ic'+i+'" style="width:16px;text-align:center">·</span>' + l + '</div>'; }).join('')
    + '</div>'
    + '<div id="rs-el" style="font-size:11px;color:#334155">0s elapsed</div>';
  document.body.appendChild(ov);

  function setRow(i, st) {
    var ic = document.getElementById('rs-ic'+i);
    var row = document.getElementById('rs-s'+i);
    if (!ic || !row) return;
    if (st === 'done') {
      ic.textContent = '✓'; row.style.color = '#4ade80';
    } else if (st === 'active') {
      ic.innerHTML = '<span style="display:inline-block;width:10px;height:10px;border:2px solid #1e2a1e;border-top-color:#4ade80;border-radius:50%;animation:rs-spin 0.8s linear infinite"></span>';
      row.style.color = '#e2e8f0';
    } else {
      ic.textContent = '·'; row.style.color = '#475569';
    }
  }

  var start = Date.now();
  var bar = 0;
  var ceiling = 8;
  var tid = setInterval(function() {
    var sec = Math.round((Date.now()-start)/1000);
    var elEl = document.getElementById('rs-el'); if (elEl) elEl.textContent = sec + 's elapsed';
    bar = bar + (ceiling - bar) * 0.12;
    var barEl = document.getElementById('rs-bar'); if (barEl) barEl.style.width = bar.toFixed(1) + '%';
    var pctEl = document.getElementById('rs-pct'); if (pctEl) pctEl.textContent = Math.round(bar) + '%';
  }, 500);

  return {
    setPhase: function(phase) {
      var m = SCOUT_PHASE_MAP[phase] || SCOUT_PHASE_MAP.queued;
      ceiling = m.ceiling;
      for (var i = 0; i < 6; i++) {
        if (i <= m.doneThru) setRow(i, 'done');
        else if (i === m.active || i === m.active2) setRow(i, 'active');
        else setRow(i, 'pending');
      }
    },
    finish: function() {
      clearInterval(tid);
      ceiling = 100; bar = 100;
      var barEl = document.getElementById('rs-bar'); if (barEl) barEl.style.width = '100%';
      var pctEl = document.getElementById('rs-pct'); if (pctEl) pctEl.textContent = '100%';
      for (var i = 0; i < 6; i++) setRow(i, 'done');
    },
    remove: function() {
      clearInterval(tid);
      var o = document.getElementById('rs-overlay'); if (o) o.remove();
    },
    showError: function(msg, opts) {
      clearInterval(tid);
      var o = document.getElementById('rs-overlay'); if (!o) return;
      o.innerHTML = ''
        + '<div style="font-size:20px;font-weight:700;color:#f87171;text-align:center">⚠ IB Scout Failed</div>'
        + '<div style="font-size:13px;color:#94a3b8;text-align:center;max-width:320px;line-height:1.5">' + String(msg || 'Unknown error').replace(/</g,'&lt;') + '</div>'
        + '<button id="rs-retry" style="padding:10px 22px;border-radius:22px;font-size:13px;font-weight:600;background:#052e16;border:1px solid #166534;color:#4ade80;cursor:pointer">Retry</button>'
        + '<button id="rs-close" style="padding:8px 16px;border-radius:18px;font-size:12px;background:transparent;border:1px solid #334155;color:#94a3b8;cursor:pointer">Close</button>';
      document.getElementById('rs-retry').onclick = function() { o.remove(); if (opts && opts.onRetry) opts.onRetry(); };
      document.getElementById('rs-close').onclick = function() { o.remove(); if (opts && opts.onClose) opts.onClose(); };
    },
  };
}

// Poll the scout_jobs row via the edge function GET endpoint until status is
// done or error. Calls onPhase(phase) on transition. Returns the project row
// (incl. scout_brief) on success. Tab-visibility wake-up prevents iOS Safari
// from stalling forever when the user backgrounds and re-foregrounds.
//
// opts.minBriefAt: the project's scout_brief_at *before* this run started.
// On re-scout the project already has a brief in the DB; the poll must not
// return it as "the result of this run" until its timestamp is newer.
async function pollScoutJob(projectId, opts) {
  opts = opts || {};
  var POLL_FAST_MS = 1500;
  var POLL_SLOW_MS = 4000;
  var MAX_TOTAL_MS = 6 * 60 * 1000;
  var FAST_FOR_MS  = 30 * 1000;
  var minBriefAtMs = opts.minBriefAt ? new Date(opts.minBriefAt).getTime() : 0;

  var start = Date.now();
  var lastPhase = '';
  var visTrigger = null;
  function visHandler() {
    if (document.visibilityState === 'visible' && visTrigger) visTrigger();
  }
  document.addEventListener('visibilitychange', visHandler);

  try {
    while (true) {
      if (Date.now() - start > MAX_TOTAL_MS) {
        throw new Error('IB Scout is taking longer than expected — check back in a minute or tap Retry.');
      }
      var row = null;
      try {
        var res = await fetch(SCOUT_API + '?project_id=' + encodeURIComponent(projectId) + '&t=' + Date.now(), { cache: 'no-store' });
        if (res.ok) row = await res.json();
        else if (res.status !== 404) _dbg('Poll HTTP ' + res.status);
      } catch(e) { _dbg('Poll transient: ' + e.message); }

      if (row) {
        var job = row.job || null;
        var phase = (job && job.phase) || (row.scout_brief ? 'done' : 'queued');
        if (phase !== lastPhase) {
          lastPhase = phase;
          try { if (opts.onPhase) opts.onPhase(phase); } catch(e) {}
        }
        if (job && job.status === 'error') {
          throw new Error(job.error || 'IB Scout pipeline failed.');
        }
        var briefAtMs = row.scout_brief_at ? new Date(row.scout_brief_at).getTime() : 0;
        var briefIsFresh = !!row.scout_brief && briefAtMs > minBriefAtMs;
        if ((job && job.status === 'done') || (briefIsFresh && (!job || job.status !== 'running'))) {
          return row;
        }
      }
      var interval = (Date.now() - start < FAST_FOR_MS) ? POLL_FAST_MS : POLL_SLOW_MS;
      await new Promise(function(resolve) {
        var t = setTimeout(function(){ visTrigger = null; resolve(); }, interval);
        visTrigger = function() { clearTimeout(t); visTrigger = null; resolve(); };
      });
    }
  } finally {
    document.removeEventListener('visibilitychange', visHandler);
  }
}

async function ibReScout() {
  var btn = document.getElementById('ibReScoutBtn');
  var projectId = new URLSearchParams(location.search).get('project') || '';
  _dbg('Re-Scout: clicked — projectId=' + projectId);
  var address = '';
  try { address = (document.querySelector('h1') || {}).textContent || ''; } catch(e) { _dbg('Re-Scout: h1 error ' + e.message); }
  if (!address) {
    try {
      var v3key = 'ib_scout_brief_v3_' + projectId;
      var cached = localStorage.getItem(v3key);
      if (cached) { var cd = JSON.parse(cached); address = cd.address || ''; }
    } catch(e) {}
  }
  if (!address || !projectId) {
    _dbg('Re-Scout: ABORT — no address or projectId');
    if (btn) { btn.textContent = '⚠ No address'; setTimeout(function(){ btn.textContent = '🔄 Re-Scout'; btn.disabled = false; }, 3000); }
    return;
  }
  if (btn) { btn.textContent = '⏳ Running…'; btn.disabled = true; }

  // Wake lock keeps the screen on while the user watches progress. Polling
  // does NOT depend on this — if iOS dims the screen anyway, the next poll
  // catches up when the tab regains focus.
  var _wakeLock = null;
  var _wakeLockActive = true;
  function _acquireWakeLock() {
    if (!navigator.wakeLock || !_wakeLockActive) return;
    navigator.wakeLock.request('screen').then(function(wl) {
      _wakeLock = wl;
      wl.addEventListener('release', function() {
        if (_wakeLockActive) _acquireWakeLock();
      });
    }).catch(function() {});
  }
  _acquireWakeLock();

  var ui = showScoutOverlay('Re-Scouting…');
  ui.setPhase('queued');

  try {
    try { localStorage.removeItem('ib_scout_brief_v3_' + projectId); } catch(e) {}
    _dbg('Re-Scout: POST kick-off');
    // `async: true` opts into the new 202+poll path. Without it the server
    // returns the full brief synchronously (legacy behavior) — that keeps
    // cached old clients working during the deploy window.
    var postRes = await fetch(SCOUT_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-app-secret': 'ib-scout-2026' },
      body: JSON.stringify({ async: true, address: address, project_id: projectId }),
    });
    _dbg('Re-Scout: POST status=' + postRes.status);
    if (!postRes.ok && postRes.status !== 202) {
      var errBody = await postRes.json().catch(function(){ return {}; });
      throw new Error(errBody.error || 'HTTP ' + postRes.status);
    }

    // window._currentScoutBriefAt was stashed by render() on initial load —
    // pass it so the poll loop only resolves on the freshly-generated brief,
    // not the stale one still sitting in the DB.
    await pollScoutJob(projectId, {
      onPhase: function(phase) { ui.setPhase(phase); },
      minBriefAt: window._currentScoutBriefAt || null,
    });

    ui.finish();
    _wakeLockActive = false;
    if (_wakeLock) { _wakeLock.release().catch(function(){}); _wakeLock = null; }
    _dbg('Re-Scout: done — reloading');
    if (btn) { btn.textContent = '✅ Done — reloading…'; }
    // Cache-busting redirect: iOS Safari often serves stale on reload().
    var u = new URL(window.location.href);
    u.searchParams.set('t', Date.now());
    window.location.href = u.toString();
  } catch(e) {
    _wakeLockActive = false;
    if (_wakeLock) { _wakeLock.release().catch(function(){}); _wakeLock = null; }
    _dbg('Re-Scout: ERROR — ' + e.message);
    ui.showError(e.message || 'failed', {
      onRetry: function() {
        if (btn) { btn.textContent = '🔄 Re-Scout'; btn.disabled = false; }
        ibReScout();
      },
      onClose: function() {
        if (btn) { btn.textContent = '🔄 Re-Scout'; btn.disabled = false; }
      },
    });
  }
}

      if (!p.contains(e.target)) p.style.display = 'none';
    });
  });
  // Zoom/pan initialiser — called after each timeline renders
  window._ptlInit = function(wrapperId, svgW, svgH) {
    var wrap = document.getElementById(wrapperId); if (!wrap) return;
    var svg  = wrap.querySelector('svg');           if (!svg)  return;
    var vbX = 0, vbW = svgW;
    var isMobile = window.innerWidth < 600;
    // On mobile, default to last 2 years for a more useful initial view
    if (isMobile) { vbW = svgW * 0.35; vbX = svgW - vbW; }
    function setVB() { svg.setAttribute('viewBox', vbX.toFixed(1)+' 0 '+vbW.toFixed(1)+' '+svgH); }
    setVB();
    // ── Scroll-to-zoom (desktop) ──
    svg.addEventListener('wheel', function(e) {
      e.preventDefault();
      var r = svg.getBoundingClientRect();
      var ratio = (e.clientX - r.left) / r.width;
      var pivot = vbX + ratio * vbW;
      var factor = e.deltaY > 0 ? 1.25 : 0.8;
      vbW = Math.min(svgW, Math.max(svgW * 0.08, vbW * factor));
      vbX = Math.max(0, Math.min(svgW - vbW, pivot - ratio * vbW));
      setVB();
    }, { passive: false });
    // ── Drag-to-pan (desktop) ──
    var dragging = false, dragX0 = 0, vbX0 = 0;
    svg.addEventListener('mousedown', function(e) {
      dragging = true; dragX0 = e.clientX; vbX0 = vbX;
      svg.style.cursor = 'grabbing'; e.preventDefault();
    });
    document.addEventListener('mousemove', function(e) {
      if (!dragging) return;
      var r = svg.getBoundingClientRect();
      var dx = (dragX0 - e.clientX) / r.width * vbW;
      vbX = Math.max(0, Math.min(svgW - vbW, vbX0 + dx)); setVB();
    });
    document.addEventListener('mouseup', function() {
      dragging = false; svg.style.cursor = 'crosshair';
    });
    // ── Pinch-to-zoom + drag-to-pan (touch/mobile) ──
    var lastDist = 0, lastTX = 0, lastVbX = 0;
    svg.addEventListener('touchstart', function(e) {
      if (e.touches.length === 2) {
        lastDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      } else if (e.touches.length === 1) {
        lastTX = e.touches[0].clientX; lastVbX = vbX;
      }
    }, { passive: true });
    svg.addEventListener('touchmove', function(e) {
      e.preventDefault();
      if (e.touches.length === 2) {
        var dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        if (!lastDist) { lastDist = dist; return; }
        var r = svg.getBoundingClientRect();
        var cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
        var ratio = (cx - r.left) / r.width;
        var pivot = vbX + ratio * vbW;
        vbW = Math.min(svgW, Math.max(svgW * 0.08, vbW * (lastDist / dist)));
        vbX = Math.max(0, Math.min(svgW - vbW, pivot - ratio * vbW));
        lastDist = dist; setVB();
      } else if (e.touches.length === 1) {
        var r2 = svg.getBoundingClientRect();
        var dx = (lastTX - e.touches[0].clientX) / r2.width * vbW;
        vbX = Math.max(0, Math.min(svgW - vbW, lastVbX + dx)); setVB();
      }
    }, { passive: false });
    svg.addEventListener('touchend', function() { lastDist = 0; });
    // ── Zoom buttons ──
    var zin  = document.getElementById(wrapperId+'_zin');
    var zout = document.getElementById(wrapperId+'_zout');
    var zrst = document.getElementById(wrapperId+'_rst');
    if (zin)  zin.addEventListener('click',  function() { var m=vbX+vbW/2; vbW=Math.max(svgW*0.08,vbW*0.55); vbX=Math.max(0,Math.min(svgW-vbW,m-vbW/2)); setVB(); });
    if (zout) zout.addEventListener('click', function() { var m=vbX+vbW/2; vbW=Math.min(svgW,vbW*1.7); vbX=Math.max(0,Math.min(svgW-vbW,m-vbW/2)); setVB(); });
    if (zrst) zrst.addEventListener('click', function() { vbX=0; vbW=svgW; setVB(); });
    // ── Fullscreen button ──
    var zfs = document.getElementById(wrapperId+'_fs');
    if (zfs) {
      zfs.addEventListener('click', function() { window._ptlFullscreen && _ptlFullscreen(wrapperId); });
      document.addEventListener('fullscreenchange', function() {
        var isFS = !!document.fullscreenElement;
        zfs.textContent = isFS ? '✕ Exit' : '⛶ Expand';
        zfs.title = isFS ? 'Exit fullscreen' : 'Expand to fullscreen';
      });
    }
  };
  // ── Fullscreen helper (inject styles once) ──
  if (!document.getElementById('_ptlFSStyle')) {
    var _s = document.createElement('style'); _s.id = '_ptlFSStyle';
    _s.textContent =
      '[data-ptl-fs]:fullscreen,[data-ptl-fs]:-webkit-full-screen{'
        +'background:#0a0a0f!important;padding:24px!important;box-sizing:border-box!important;'
        +'display:flex!important;flex-direction:column!important;gap:10px!important;overflow:auto!important}'
      +'[data-ptl-fs]:fullscreen .ptl-title-row,'
      +'[data-ptl-fs]:-webkit-full-screen .ptl-title-row{font-size:13px!important}'
      +'[data-ptl-fs]:fullscreen .ptl-chart-row,'
      +'[data-ptl-fs]:-webkit-full-screen .ptl-chart-row{flex:1!important;min-height:0!important}'
      +'[data-ptl-fs]:fullscreen .ptl-chart-row svg,'
      +'[data-ptl-fs]:-webkit-full-screen .ptl-chart-row svg{'
        +'height:100%!important;max-height:calc(100vh - 180px)!important}'
      // Dot hover highlights
      +'.ptl-ib{cursor:pointer;transition:filter .1s}'
      +'.ptl-ib:hover{filter:drop-shadow(0 0 5px white) brightness(1.4)}'
      +'.ptl-dot{transition:fill-opacity .1s}'
      +'.ptl-dot:hover{fill-opacity:0.7!important}';
    document.head.appendChild(_s);
  }
  window._ptlFullscreen = function(wrapperId) {
    var wrap = document.getElementById(wrapperId); if (!wrap) return;
    var container = wrap.closest('[data-ptl-fs]'); if (!container) return;
    if (document.fullscreenElement) {
      document.exitFullscreen && document.exitFullscreen();
    } else {
      var req = container.requestFullscreen || container.webkitRequestFullscreen || container.mozRequestFullScreen;
      if (req) req.call(container);
    }
  };
}

// ── Permit Activity Timeline ──────────────────────────────────────────────────
function buildPermitTimeline(permits, address) {
  if (!permits || permits.length === 0) return '';
  address = address || '';

  var CATS = [
    { id:'controls',   label:'Controls / BAS',   color:'#2dd4bf', kw:['bas','bms','building automation','ddc','scada','energy management','controls','building management'] },
    { id:'access',     label:'Access / Low-V',    color:'#a78bfa', kw:['access control','low voltage','cabling','security','surveillance','camera','intercom'] },
    { id:'mechanical', label:'Mechanical / HVAC', color:'#60a5fa', kw:['hvac','mechanical','air handler','ahu','vav','chiller','boiler','cooling tower','heat pump','refrigerant'] },
    { id:'fire',       label:'Fire Alarm',        color:'#f87171', kw:['fire alarm','fire suppression','sprinkler','smoke','fire protection'] },
    { id:'electrical', label:'Electrical',        color:'#fbbf24', kw:['electrical','generator','ups','power monitoring','switchgear','transformer','switchboard'] },
    { id:'other',      label:'Other',             color:'#475569', kw:[] },
  ];

  function categorizePerm(p) {
    var kw = (p.keywords_matched||[]).map(function(k){return k.toLowerCase();});
    var combined = kw.join(' ')+' '+(p.type||'').toLowerCase()+' '+(p.description||'').toLowerCase();
    for (var ci=0; ci<CATS.length-1; ci++) {
      for (var ki=0; ki<CATS[ci].kw.length; ki++) {
        if (combined.indexOf(CATS[ci].kw[ki]) !== -1) return CATS[ci];
      }
    }
    return CATS[CATS.length-1];
  }

  // Parse dates
  var dated = [];
  for (var i=0; i<permits.length; i++) {
    var p = permits[i];
    var ds = p.closed_date || p.opened_date;
    if (!ds) continue;
    var d = new Date(ds);
    if (isNaN(d.getTime())) continue;
    dated.push({ p:p, date:d, cat:categorizePerm(p) });
  }
  if (dated.length === 0) return '';

  var now = new Date();
  var earliest = new Date(Math.min.apply(null, dated.map(function(x){return x.date.getTime();})));
  var startDate = new Date(Math.min(earliest.getTime(), new Date(now.getFullYear()-6, 0, 1).getTime()));
  var endDate   = new Date(now.getFullYear(), 11, 31);
  var totalMs   = endDate.getTime() - startDate.getTime();

  // Layout: HTML label column (90px) + SVG chart
  var LABEL_W = 96;  // px — HTML column, not part of SVG
  var W=680, H=168, PAD_R=8, PAD_T=6, PAD_B=22;
  var CW=W-PAD_R, CH=H-PAD_T-PAD_B;
  var LANE_H=CH/CATS.length;

  function xp(date){ return ((date.getTime()-startDate.getTime())/totalMs)*CW; }
  function yCenter(catIdx){ return PAD_T+(catIdx+0.5)*LANE_H; }

  var uid    = Math.random().toString(36).slice(2,9);
  var tipId  = 'ptip_'+uid;
  var panId  = 'ptlpan_'+uid;
  var wrapId = 'ptlw_'+uid;
  var bands='', grid='', yearLabels='', nonIBcircles='', ibCircles='';
  // Build lookup table for BD click panel
  var ptlDataArr = [];

  // Lane bands
  for (var li=0; li<CATS.length; li++) {
    var by = PAD_T + li*LANE_H;
    bands += '<rect x="0" y="'+by.toFixed(1)+'" width="'+CW+'" height="'+LANE_H.toFixed(1)+'" fill="'+(li%2===0?'#070b12':'#060910')+'"/>';
  }

  // Year grid lines + labels (drawn over full SVG coordinate width — viewBox zoom handles display)
  for (var yr=startDate.getFullYear(); yr<=endDate.getFullYear()+1; yr++) {
    var gx = xp(new Date(yr,0,1));
    if (gx < 0 || gx > CW) continue;
    grid += '<line x1="'+gx.toFixed(1)+'" y1="'+PAD_T+'" x2="'+gx.toFixed(1)+'" y2="'+(H-PAD_B)+'" stroke="#1a2035" stroke-width="1"/>';
    yearLabels += '<text x="'+gx.toFixed(1)+'" y="'+(H-PAD_B+14)+'" text-anchor="middle" font-size="9" fill="#475569" font-family="sans-serif">'+yr+'</text>';
  }
  // Today line
  var tx = xp(now);
  grid += '<line x1="'+tx.toFixed(1)+'" y1="'+PAD_T+'" x2="'+tx.toFixed(1)+'" y2="'+(H-PAD_B)+'" stroke="#475569" stroke-width="1" stroke-dasharray="3,3"/>';
  yearLabels += '<text x="'+tx.toFixed(1)+'" y="'+(H-PAD_B+14)+'" text-anchor="middle" font-size="8" fill="#475569" font-family="sans-serif">now</text>';

  // Permit circles — non-IB rendered first (below IB dots)
  for (var di=0; di<dated.length; di++) {
    var item = dated[di];
    var catIdx = 0;
    for (var ci2=0; ci2<CATS.length; ci2++) { if(CATS[ci2].id===item.cat.id){catIdx=ci2;break;} }
    var cx   = xp(item.date).toFixed(1);
    var jitter = ((di*7+catIdx*13)%9-4)*(LANE_H*0.07);
    var cy   = (yCenter(catIdx)+jitter).toFixed(1);
    var isIB = item.p.keywords_matched && item.p.keywords_matched.length > 0;
    var col  = item.cat.color;
    var dateStr  = (item.p.closed_date||item.p.opened_date||'').slice(0,7);
    var descFull = (item.p.description||item.p.type||'');
    // Strip Accela internal account suffix e.g. "Power Design Inc****MAIN***" → "Power Design Inc"
    var ctorFull = (item.p.contractor||'').replace(/\*+MAIN\**/gi,'').replace(/\s*\*+\s*$/,'').trim();
    var descSafe = descFull.slice(0,80).replace(/'/g,"\\'").replace(/"/g,'&quot;');
    var ctipSafe = ctorFull.slice(0,60).replace(/'/g,"\\'").replace(/"/g,'&quot;');
    var tipTxt   = (dateStr+(ctipSafe?' · '+ctipSafe:'')+(descSafe?' · '+descSafe:'')).replace(/'/g,"\\'");
    var mEnter   = 'window._ptlShow&&_ptlShow(event,\''+tipId+'\',\''+tipTxt+'\')';
    var mLeave   = 'window._ptlHide&&_ptlHide(\''+tipId+'\')';
    // Store full data for BD click panel
    ptlDataArr[di] = {
      address: address,
      date: dateStr,
      description: descFull.slice(0,200),
      type: item.p.type||'',
      contractor: ctorFull,
      status: item.p.status||'',
      keywords: item.p.keywords_matched||[],
      catLabel: item.cat.label,
      color: col
    };
    var mClick = isIB ? ' onclick="window._ptlClickPanel&&_ptlClickPanel(\''+uid+'\','+di+',event)"' : '';
    if (!isIB) {
      nonIBcircles += '<circle class="ptl-dot" cx="'+cx+'" cy="'+cy+'" r="2" fill="'+col+'" fill-opacity="0.22"'
        +' onmouseenter="'+mEnter+'" onmouseleave="'+mLeave+'"/>';
    } else {
      ibCircles += '<circle cx="'+cx+'" cy="'+cy+'" r="8" fill="'+col+'" fill-opacity="0.12" stroke="'+col+'" stroke-width="0.7" stroke-opacity="0.35"/>'
        +'<circle class="ptl-ib" cx="'+cx+'" cy="'+cy+'" r="5.5" fill="'+col+'" fill-opacity="0.92" stroke="'+col+'" stroke-width="1.5"'
        +' onmouseenter="'+mEnter+'" onmouseleave="'+mLeave+'"'+mClick+'/>';
    }
  }

  // Left label column (HTML, outside SVG — always readable)
  var labelColHtml = '<div style="display:flex;flex-direction:column;width:'+LABEL_W+'px;flex-shrink:0;padding-top:'+PAD_T+'px;padding-bottom:'+PAD_B+'px;box-sizing:border-box">';
  for (var lci=0; lci<CATS.length; lci++) {
    var lcat = CATS[lci];
    var ibCnt = dated.filter(function(x){return x.cat.id===lcat.id && x.p.keywords_matched && x.p.keywords_matched.length>0;}).length;
    labelColHtml += '<div style="flex:1;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;border-right:2px solid '+lcat.color+'30">'
      +'<span style="font-size:10px;font-weight:600;color:'+lcat.color+';text-align:right;line-height:1.3">'+lcat.label
      +(ibCnt?'<br><span style="font-size:9px;font-weight:700;color:'+lcat.color+'">'+ibCnt+' IB</span>':'')
      +'</span></div>';
  }
  labelColHtml += '</div>';

  // Zoom controls row
  var btnBase = 'font-family:inherit;cursor:pointer;border-radius:4px;padding:3px 9px;font-size:11px;font-weight:700;border:1px solid #334155;background:#0f172a;color:#94a3b8;';
  var zoomCtls = '<div style="display:flex;align-items:center;gap:6px;margin-bottom:5px">'
    +'<button id="'+wrapId+'_zin"  style="'+btnBase+'">＋</button>'
    +'<button id="'+wrapId+'_zout" style="'+btnBase+'">－</button>'
    +'<button id="'+wrapId+'_rst"  style="'+btnBase+'font-size:9px;font-weight:400;">Reset</button>'
    +'<button id="'+wrapId+'_fs"   style="'+btnBase+'margin-left:6px;font-size:10px" title="Expand to fullscreen">⛶ Expand</button>'
    +'<span style="font-size:9px;color:#334155;margin-left:4px">scroll to zoom · drag to pan · pinch on mobile</span>'
    +'</div>';

  var svgHtml = '<div style="flex:1;position:relative;min-width:0">'
    +'<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block;border-radius:0 6px 6px 0;border:1px solid #111827;border-left:none;touch-action:none;-webkit-user-select:none;user-select:none">'
    +bands+grid+nonIBcircles+ibCircles+yearLabels
    +'</svg>'
    +'<div id="'+tipId+'" style="display:none;position:absolute;background:#1e2433;border:1px solid #334155;border-radius:5px;padding:5px 10px;font-size:10px;color:#cbd5e1;pointer-events:none;z-index:20;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;box-shadow:0 3px 10px rgba(0,0,0,.6)"></div>'
    +'<div id="'+panId+'" style="display:none;position:absolute;background:#111827;border:1px solid #334155;border-radius:8px;padding:12px 14px;z-index:30;width:320px;box-shadow:0 6px 24px rgba(0,0,0,.7)"></div>'
    +'</div>';

  // Legend: category swatches + IB-vs-other key
  var ibTotal = dated.filter(function(x){return x.p.keywords_matched&&x.p.keywords_matched.length>0;}).length;
  var legendHtml = '<div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:6px;align-items:center">';
  for (var lgi=0; lgi<CATS.length; lgi++) {
    var lg = CATS[lgi]; var lcnt = dated.filter(function(x){return x.cat.id===lg.id;}).length;
    if (!lcnt) continue;
    legendHtml += '<div style="display:flex;align-items:center;gap:5px;font-size:10px;color:#64748b">'
      +'<svg width="10" height="10"><circle cx="5" cy="5" r="4.5" fill="'+lg.color+'"/></svg>'
      +lg.label+' <span style="color:#334155">('+lcnt+')</span></div>';
  }
  legendHtml += '<div style="margin-left:auto;display:flex;align-items:center;gap:12px">'
    +'<div style="display:flex;align-items:center;gap:5px;font-size:10px;color:#94a3b8">'
    +'<svg width="16" height="16"><circle cx="8" cy="8" r="5.5" fill="#94a3b8" fill-opacity="0.9"/><circle cx="8" cy="8" r="8" fill="none" stroke="#94a3b8" stroke-width="0.7" stroke-opacity="0.35"/></svg>'
    +'IB signal ('+ibTotal+')</div>'
    +'<div style="display:flex;align-items:center;gap:5px;font-size:10px;color:#475569">'
    +'<svg width="12" height="12"><circle cx="6" cy="6" r="2" fill="#475569" fill-opacity="0.5"/></svg>'
    +'other ('+( dated.length-ibTotal)+')</div>'
    +'</div></div>';

  // Deferred init — runs after HTML is in the DOM; register BD data lookup
  var _safeJson = JSON.stringify(ptlDataArr).replace(/<\/script>/gi, '<\\/script>');
  var initScript = '<script>window._ptlData=window._ptlData||{};window._ptlData["'+uid+'"]='+_safeJson+';'
    +'setTimeout(function(){window._ptlInit&&_ptlInit(\''+wrapId+'\','+W+','+H+');},0);<\/script>';

  return '<div data-ptl-fs style="margin-bottom:14px">'
    +'<div class="ptl-title-row" style="font-size:10px;color:#475569;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">'
    +'Permit Activity Timeline <span style="font-weight:400;text-transform:none;color:#334155">('+dated.length+' dated permits)</span>'
    +'</div>'
    +legendHtml
    +zoomCtls
    +'<div id="'+wrapId+'" class="ptl-chart-row" style="display:flex;border-radius:6px;overflow:hidden;background:#070b12">'
    +labelColHtml+svgHtml
    +'</div>'
    +initScript
    +'</div>';
}

async function fetchKnownContacts(projectId) {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/contacts?project_id=eq.${projectId}&select=name,title,email,phone,source,linkedin_url,hubspot_contact_id&order=name.asc`,
      { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } }
    );
    if (!res.ok) return [];
    const rows = await res.json() || [];
    // Deduplicate by name (case-insensitive) — keep first occurrence
    const seen = new Set();
    return rows.filter(c => {
      const key = (c.name || '').toLowerCase();
      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    });
  } catch(e) { return []; }
}

  if (!el) return;
  el.innerHTML += '<div>' + String(msg).replace(/</g,'&lt;') + '</div>';
}
function _initDebug() {
  if (new URLSearchParams(location.search).get('debug') !== '1') return;
  var panel = document.createElement('div');
  panel.id = 'ib-debug-panel';
  panel.style.cssText = 'position:fixed;bottom:0;left:0;right:0;max-height:40vh;overflow-y:auto;background:#000;color:#0f0;font-family:monospace;font-size:11px;padding:8px;z-index:9999;border-top:2px solid #0f0';
  panel.innerHTML = '<div style="color:#ff0;font-weight:bold">🐛 IB Scout Debug</div>';
  document.body.appendChild(panel);
}
_initDebug();

async function load() {
  const params = new URLSearchParams(location.search);
  const projectId = params.get('project');
  if (!projectId) { showError('No project ID in URL.'); return; }

  _dbg('load() start — projectId: ' + projectId);
  _dbg('UA: ' + navigator.userAgent.slice(0,80));

  // 1. Try localStorage first (instant, no network — works on originating device)
  try {
    const v3key = 'ib_scout_brief_v3_' + projectId;
    const v2key = 'ib_scout_brief_v2_' + projectId;
    const cached3 = localStorage.getItem(v3key);
    const cached2 = localStorage.getItem(v2key);
    _dbg('localStorage v3 found: ' + !!cached3 + ' | v2 found: ' + !!cached2);
    if (cached3) {
      const data = JSON.parse(cached3);
      const hasPermits = data?.brief?.accela_permits;
      _dbg('v3 cache hit — accela_permits: ' + (hasPermits === null ? 'NULL' : hasPermits ? 'HAS DATA (total='+hasPermits.total_permits+')' : 'MISSING'));
      if (data?.brief) {
        const knownContacts = await fetchKnownContacts(projectId);
        render({
          scout_brief: data.brief, scout_brief_at: data.at, address: data.address,
          property_type: data.property_type || null,
          use_type: data.use_type || null,
          num_stories: data.num_stories || null,
          building_class: data.building_class || null,
          building_sf: data.building_sf || null,
          sf_verified: data.sf_verified || false,
          owner_developer: data.owner_developer || null,
          limited_partners: data.limited_partners || null,
        }, knownContacts);
        return;
      }
    }
  } catch(e) { _dbg('localStorage error: ' + e.message); }

  // 2. Edge function GET (service role key server-side — anon key never touches project data)
  // NOTE: removed direct Supabase anon-key read — all reads now go through the edge function
  // To revert: restore the try/catch block that fetched from ${SUPABASE_URL}/rest/v1/projects
  try {
    _dbg('Trying edge function GET…');
    const [res, contacts] = await Promise.all([
      fetch(`${SCOUT_API}?project_id=${projectId}&t=${Date.now()}`),
      fetchKnownContacts(projectId),
    ]);
    _dbg('Edge fn status: ' + res.status);
    if (res.ok) {
      const row = await res.json();
      _dbg('Edge fn scout_brief present: ' + !!row?.scout_brief + ' job: ' + JSON.stringify(row?.job));
      if (row?.scout_brief) { render(row, contacts); return; }
      // Job is running for this project (someone else kicked it off, or the
      // shareable link was opened mid-pipeline). Show live progress instead
      // of "not found" — once the job completes we render in place.
      if (row?.job && row.job.status === 'running') {
        const address = row.address || '';
        const ui = showScoutOverlay(address ? address : 'Generating IB Scout report…');
        ui.setPhase(row.job.phase || 'queued');
        try {
          const finalRow = await pollScoutJob(projectId, { onPhase: function(phase) { ui.setPhase(phase); } });
          ui.finish();
          // Cache-busting redirect picks up the freshly written brief without
          // re-running this load() (which would still race the cache).
          var u = new URL(window.location.href);
          u.searchParams.set('t', Date.now());
          window.location.href = u.toString();
          return;
        } catch(e) {
          ui.showError(e.message || 'failed', {
            onRetry: function() { ibReScout(); },
            onClose: function() { showError('IB Scout failed: ' + (e.message || 'unknown')); },
          });
          return;
        }
      }
      if (row?.job && row.job.status === 'error') {
        showError('IB Scout failed: ' + (row.job.error || 'unknown') + ' — re-run from the tracker.');
        return;
      }
    }
  } catch(e) { _dbg('Edge fn error: ' + e.message); }

  _dbg('All paths exhausted — showing error');
  showError('No IB Scout report found for this property. Run IB Scout first, then share the link.');
}

function setPageMeta(address) {
  const title = address ? `IB Scout — ${address}` : 'IB Scout Report';
  const desc  = address ? `Property intelligence report for ${address} · Intelligent Buildings` : 'Property intelligence report by Intelligent Buildings';
  document.title = title;
  document.querySelector('meta[property="og:title"]')?.setAttribute('content', title);
  document.querySelector('meta[property="og:description"]')?.setAttribute('content', desc);
  document.querySelector('meta[name="twitter:title"]')?.setAttribute('content', title);
  document.querySelector('meta[name="twitter:description"]')?.setAttribute('content', desc);
  document.querySelector('meta[name="description"]')?.setAttribute('content', desc);
}
