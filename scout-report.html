<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IB Scout Report</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0a0a0f;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:16px;max-width:800px;margin:0 auto;min-height:100vh}
  h1{font-size:20px;font-weight:700;color:#f1f5f9;margin-bottom:4px}
  .meta{font-size:12px;color:#64748b;margin-bottom:18px}
  .card{background:#0f1117;border:1px solid #1e2433;border-radius:10px;padding:18px;margin-bottom:14px}
  .card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;margin-bottom:12px;display:flex;align-items:center;gap:6px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .field{display:flex;flex-direction:column;gap:2px}
  .field label{font-size:10px;color:#475569;text-transform:uppercase;letter-spacing:.05em}
  .field span{font-size:13px;color:#cbd5e1}
  .report{font-size:13px;line-height:1.8;color:#cbd5e1;white-space:pre-wrap}
  table{width:100%;border-collapse:collapse;font-size:12px}
  th{text-align:left;color:#475569;font-weight:600;padding:6px 8px;border-bottom:1px solid #1e2433}
  td{padding:6px 8px;border-bottom:1px solid #0f1117;color:#94a3b8}
  .company-card{padding:14px;background:#0a0f0a;border:1px solid #1a3a1a;border-radius:8px;margin-bottom:10px}
  .contact-chip{margin-top:6px;padding:6px 10px;background:#0a0a14;border-radius:6px;font-size:12px}
  .q-row{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid #0f1117;font-size:13px;color:#cbd5e1}
  .spinner{width:40px;height:40px;border:3px solid #1a2a1a;border-top-color:#4ade80;border-radius:50%;animation:spin 0.8s linear infinite;margin:80px auto}
  @keyframes spin{to{transform:rotate(360deg)}}
  .error{text-align:center;padding:60px 20px;color:#f87171}
  .badge{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:10px;margin-bottom:20px}
  .powered{font-size:10px;color:#334155;text-align:right;margin-top:8px;padding-top:12px;border-top:1px solid #1e2433}
  @media(max-width:600px){.grid2{grid-template-columns:1fr}.badge{flex-wrap:wrap}}
  @media(min-width:640px){body{padding:24px}}
  @media print{body{background:#fff;color:#000;padding:16px}.card{border-color:#ddd;background:#fff}.card-title,.field label{color:#666}.field span,.report,.q-row{color:#000}.company-card{border-color:#ddd;background:#f9f9f9}}
</style>
</head>
<body>

<div id="root"><div class="spinner"></div></div>

<script>
function ibToggleStoryboard(btn) {
  var bd = document.getElementById('ib-bd-panel');
  var sb = document.getElementById('ib-storyboard-panel');
  var on = sb && sb.style.display === 'none';
  if (sb) sb.style.display = on ? 'block' : 'none';
  if (bd) bd.style.display = on ? 'none' : 'block';
  btn.textContent = on ? '📊 BD Report' : '📋 Storyboard';
}

const SUPABASE_URL = 'https://lnldwxttyfjmaobluciy.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxubGR3eHR0eWZqbWFvYmx1Y2l5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMDI4ODksImV4cCI6MjA5MTg3ODg4OX0.W0ujmEJpBqKJcMYdwd__bJ0yszSG5QGBfqwFl7hZdLc';
const SCOUT_API   = 'https://lnldwxttyfjmaobluciy.supabase.co/functions/v1/ib-scout';

async function fetchKnownContacts(projectId) {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/contacts?project_id=eq.${projectId}&select=name,title,email,phone,source,linkedin_url&order=name.asc`,
      { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } }
    );
    if (!res.ok) return [];
    return await res.json() || [];
  } catch(e) { return []; }
}

async function load() {
  const params = new URLSearchParams(location.search);
  const projectId = params.get('project');
  if (!projectId) { showError('No project ID in URL.'); return; }

  // 1. Try localStorage first (instant, no network — works on originating device)
  try {
    const cached = localStorage.getItem('ib_scout_brief_' + projectId);
    if (cached) {
      const data = JSON.parse(cached);
      if (data?.brief) {
        const knownContacts = await fetchKnownContacts(projectId);
        render({ scout_brief: data.brief, scout_brief_at: data.at, address: data.address }, knownContacts);
        return;
      }
    }
  } catch(e) { /* localStorage unavailable, fall through */ }

  // 2. Try direct Supabase read (anon key — works if RLS allows public SELECT)
  try {
    const [briefRes, contacts] = await Promise.all([
      fetch(`${SUPABASE_URL}/rest/v1/projects?id=eq.${projectId}&select=address,property_name,scout_brief,scout_brief_at`,
        { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } }),
      fetchKnownContacts(projectId),
    ]);
    const rows = await briefRes.json();
    if (rows?.length && rows[0].scout_brief) { render(rows[0], contacts); return; }
  } catch(e) { /* RLS may be blocking — fall through to edge function */ }

  // 3. Fall back to edge function GET (service role key — always bypasses RLS)
  try {
    const [res, contacts] = await Promise.all([
      fetch(`${SCOUT_API}?project_id=${projectId}`),
      fetchKnownContacts(projectId),
    ]);
    if (res.ok) {
      const row = await res.json();
      if (row?.scout_brief) { render(row, contacts); return; }
    }
  } catch(e) { /* fall through to error */ }

  showError('No IB Scout report found for this property. Run IB Scout first, then share the link.');
}

function fmt(v) { return v != null ? String(v) : '—'; }
function fmtPrice(v) { return v ? '$' + Number(v).toLocaleString() : '—'; }
function fmtSF(v) { return v ? Number(v).toLocaleString() + ' SF' : '—'; }

function render(row, knownContacts) {
  const d = row.scout_brief;
  // Route to v2 renderer
  if (d.schema_version === 2 || d.pursuit_score || d.brief?.schema_version === 2 || d.brief?.verdict) { renderV2(row, knownContacts || []); return; }
  const n = d.normalized || {};
  const b = d.brief || {};
  const scoreColor = d.score >= 70 ? '#4ade80' : d.score >= 40 ? '#facc15' : '#94a3b8';
  const priorityBg = d.score >= 70 ? '#052e16' : d.score >= 40 ? '#422006' : '#0f172a';
  const dateStr = row.scout_brief_at
    ? new Date(row.scout_brief_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})
    : '';

  document.title = `IB Scout — ${d.formatted_address || row.address}`;

  const historyRows = (n.sales_history || []).map(s => `
    <tr><td>${s.date||'—'}</td><td>${s.buyer||'—'}</td><td>${s.seller||'—'}</td>
    <td style="text-align:right">${s.price?'$'+Number(s.price).toLocaleString():'—'}</td></tr>`).join('');

  const companiesHtml = (b.companies || []).map(co => {
    const contacts = (co.contacts_to_find || []).map(c =>
      `<div class="contact-chip"><span style="color:#a78bfa;font-weight:600">${c.title}</span>
       <span style="color:#475569"> — ${c.why}</span></div>`).join('');
    return `<div class="company-card">
      <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:6px">
        <span style="font-size:14px;font-weight:700;color:#f1f5f9">${co.company||'—'}</span>
        <span style="font-size:11px;color:#4ade80;background:#052e16;padding:2px 7px;border-radius:4px">${co.role||''}</span>
      </div>
      ${co.angle?`<p style="font-size:12px;color:#94a3b8;font-style:italic;margin-bottom:6px">"${co.angle}"</p>`:''}
      <div style="font-size:10px;color:#475569;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Contacts to find</div>
      ${contacts}</div>`;
  }).join('');

  const itHtml = b.it_contact ? `
    <div style="padding:14px;background:#0a0a14;border:1px solid #1e1a3a;border-radius:8px;margin-top:10px">
      <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:6px">
        <span style="font-size:13px;font-weight:700;color:#f1f5f9">${b.it_contact.likely_company||'Unknown'}</span>
        <span style="font-size:11px;color:#a78bfa;background:#1e1a3a;padding:2px 7px;border-radius:4px">IT / Technology</span>
      </div>
      ${b.it_contact.angle?`<p style="font-size:12px;color:#94a3b8;font-style:italic;margin-bottom:6px">"${b.it_contact.angle}"</p>`:''}
      <div style="font-size:11px;color:#475569">Titles: ${(b.it_contact.titles_to_find||[]).join(' · ')}</div>
    </div>` : '';

  const questionsHtml = (b.discovery_questions||[]).map((q,i) =>
    `<div class="q-row"><span style="color:#4ade80;font-weight:700;min-width:18px">${i+1}.</span><span>${q}</span></div>`
  ).join('');

  document.getElementById('root').innerHTML = `
    <div style="background:#16a34a18;border:1px solid #16a34a33;border-radius:8px;padding:8px 14px;font-size:11px;color:#4ade80;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
      <span style="display:flex;align-items:center;gap:6px">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/><path d="M11 8v3l2 2"/></svg>
        IB Scout · Attom + AI · ${dateStr}
      </span>
      <span style="color:#475569">detail=${d.attom_raw?.detail_found} · sale=${d.attom_raw?.sale_found} · ${d.attom_raw?.history_count||0} transactions</span>
    </div>

    <h1>${d.formatted_address || row.address}</h1>
    <div class="meta">${n.property_type||''} · ${n.building_sf?Number(n.building_sf).toLocaleString()+' SF':''} · Built ${n.year_built||'?'} · ${n.stories||'?'} stories</div>

    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap">
      <div class="badge" style="background:${priorityBg};border:2px solid ${scoreColor}55">
        <span style="font-size:36px;font-weight:800;color:${scoreColor};line-height:1">${d.score}</span>
        <div style="display:flex;flex-direction:column;gap:1px">
          <span style="font-size:9px;color:${scoreColor};opacity:0.6;text-transform:uppercase;letter-spacing:.1em;font-weight:700">IB Scout Score</span>
          <span style="font-size:15px;font-weight:700;color:${scoreColor}">${d.priority}</span>
        </div>
      </div>
      ${b.next_step?`<div style="flex:1;min-width:200px;padding:10px 14px;background:#0f1117;border:1px solid #1e2433;border-radius:10px;font-size:12px;color:#cbd5e1"><span style="color:#4ade80;font-weight:700">Next step: </span>${b.next_step}</div>`:''}
    </div>

    ${companiesHtml||itHtml?`<div class="card">
      <div class="card-title">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Who to Contact
      </div>
      ${companiesHtml}${itHtml}
    </div>`:''}

    <div class="card">
      <div class="card-title">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Intelligence Report
      </div>
      <div class="report">${(b.report||'').replace(/</g,'&lt;')}</div>
    </div>

    ${questionsHtml?`<div class="card">
      <div class="card-title">Discovery Questions</div>
      ${questionsHtml}
    </div>`:''}

    <div class="card">
      <div class="card-title">🏢 Ownership & Building</div>
      <div class="grid2">
        <div class="field"><label>Owner Entity</label><span>${fmt(n.owner_entity)}</span></div>
        <div class="field"><label>Owner Type</label><span>${fmt(n.owner_type)}</span></div>
        <div class="field"><label>Mailing Address</label><span>${fmt(n.owner_mailing_address)}</span></div>
        <div class="field"><label>APN</label><span>${fmt(n.apn)}</span></div>
        <div class="field"><label>Building SF</label><span>${fmtSF(n.building_sf)}</span></div>
        <div class="field"><label>Stories</label><span>${fmt(n.stories)}</span></div>
        <div class="field"><label>Year Built</label><span>${fmt(n.year_built)}</span></div>
        <div class="field"><label>Assessed Value</label><span>${fmtPrice(n.assessed_value)}</span></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">📋 Transaction History</div>
      <div class="field" style="margin-bottom:12px">
        <label>Last Sale</label>
        <span>${fmt(n.last_sale_date)} · ${fmtPrice(n.last_sale_price)}${n.price_per_sf?' · $'+n.price_per_sf+'/SF':''} · ${fmt(n.sale_disclosure)}</span>
      </div>
      ${historyRows?`<table><thead><tr><th>Date</th><th>Buyer</th><th>Seller</th><th style="text-align:right">Price</th></tr></thead><tbody>${historyRows}</tbody></table>`
        :'<p style="font-size:12px;color:#475569">No transaction history in Attom.</p>'}
    </div>

    <div class="powered">Powered by Attom Data Solutions · Intelligent Buildings (IB) · ${d.formatted_address||row.address}</div>
  `;
}

function buildScoutHtml(d, address, dateStr, knownContacts) {
  knownContacts = knownContacts || [];
  const n = d.normalized || {};
  const b = d.brief || {};
  const ps = d.pursuit_score || {};
  const bd = ps.breakdown || {};
  const news = d.news || {};
  const newsItems = news.items || [];
  const score = d.score || 0;
  const energyEst = d.energy_estimate || null;
  const vendorEst = d.vendor_estimate || null;
  const sb = b.storyboard || null;

  // Normalize action
  const rawAction = ps.action || '';
  const action = rawAction==='Needs Verification'?'Verify':(rawAction==='Disqualify'&&score>=28)?'Verify':rawAction||(score>=72?'Pursue':score>=48?'Watch':score>=28?'Verify':'Disqualify');

  const colors = {Pursue:{bg:'#052e16',border:'#16a34a',text:'#4ade80'},Watch:{bg:'#422006',border:'#d97706',text:'#fbbf24'},Verify:{bg:'#431407',border:'#ea580c',text:'#fb923c'},Disqualify:{bg:'#18181b',border:'#52525b',text:'#94a3b8'}};
  const c = colors[action]||colors.Verify;

  const pill=(t,col,bg)=>`<span style="font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;background:${bg||'rgba(255,255,255,0.06)'};color:${col||'#475569'};white-space:nowrap">${t}</span>`;
  const FACT=`<span style="font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;background:#0c2a2a;color:#2dd4bf;letter-spacing:.04em;flex-shrink:0">FACT</span>`;
  const INF=`<span style="font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;background:#1e1a3a;color:#a78bfa;letter-spacing:.04em;flex-shrink:0">INFERENCE</span>`;
  const card=(title,icon,html,bc)=>`<div class="ib-card" style="background:#0f1117;border:1px solid ${bc||'#1e2433'};border-radius:10px;padding:16px 14px;margin-bottom:12px"><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#64748b;margin-bottom:14px;display:flex;align-items:center;gap:8px"><span style="font-size:17px;line-height:1">${icon}</span>${title}</div>${html}</div>`;
  const drow=(label,val,badge)=>val?`<div style="display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid #0a0a14"><div style="min-width:100px;font-size:11px;color:#475569;flex-shrink:0;padding-top:1px">${label}</div><div style="font-size:12px;color:#cbd5e1;flex:1;line-height:1.5">${val}</div>${badge||''}</div>`:'';
  const miniBar=(dim,label,icon)=>{if(!dim)return'';const p=Math.round(dim.score/dim.max*100),bc=p>=70?'#4ade80':p>=40?'#fbbf24':'#f87171';return`<div style="margin-bottom:9px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px"><span style="font-size:11px;color:#94a3b8">${icon||''} ${label}</span><span style="color:${bc};font-weight:800;font-size:13px;line-height:1">${dim.score}<span style="font-size:10px;font-weight:400;opacity:.55">/${dim.max}</span></span></div><div style="background:#1e293b;border-radius:3px;height:5px"><div style="background:${bc};width:${p}%;height:5px;border-radius:3px"></div></div></div>`;};
  const confC=x=>x==='High'?'#4ade80':x==='Medium'?'#fbbf24':'#f87171';
  const urgC=u=>u==='Immediate'?'#f87171':u==='Near-term'?'#fbbf24':'#94a3b8';
  const urgBorder=u=>u==='Immediate'?'#f87171':u==='Near-term'?'#f59e0b':'#334155';
  const prioC=p=>p==='Primary'?'#4ade80':p==='Secondary'?'#fbbf24':'#94a3b8';
  const prioBg=p=>p==='Primary'?'#052e16':p==='Secondary'?'#422006':'#1e293b';
  const sevC=s=>s==='High'?'#f87171':s==='Medium'?'#fbbf24':'#94a3b8';
  const bldgLine=[n.building_sf?Number(n.building_sf).toLocaleString()+' SF':'',n.year_built?'Built '+n.year_built:'',n.stories?n.stories+' stories':'',n.property_type||''].filter(Boolean).join(' · ');

  // Stat chips
  const statChips=[n.building_sf&&`🏢 ${Math.round(Number(n.building_sf)/1000)}K SF`,n.year_built&&`🗓 ${n.year_built}`,n.stories&&`${n.stories} fl`,(n.owner_type||'').toUpperCase()||null].filter(Boolean).map(s=>`<span style="background:#1a2236;border-radius:5px;padding:4px 9px;font-size:11px;color:#94a3b8;font-weight:500;white-space:nowrap">${s}</span>`).join('');

  // Score ring (CSS conic-gradient)
  const ringDeg=Math.round(score*3.6);
  const ringHtml=`<div style="width:56px;height:56px;border-radius:50%;background:conic-gradient(${c.text} ${ringDeg}deg,#1e293b ${ringDeg}deg);display:flex;align-items:center;justify-content:center;flex-shrink:0"><div style="width:42px;height:42px;border-radius:50%;background:#0f1117;display:flex;flex-direction:column;align-items:center;justify-content:center"><span style="font-size:15px;font-weight:800;color:${c.text};line-height:1">${score}</span></div></div>`;

  // S1 — Decision Panel
  const s1=`<div class="ib-s1" style="background:${c.bg};border:2px solid ${c.border}55;border-radius:12px;padding:18px 16px;margin-bottom:14px">
  <div style="display:flex;gap:14px;align-items:center;margin-bottom:14px;flex-wrap:wrap">
    ${ringHtml}
    <div style="flex:1;min-width:120px">
      <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:${c.text};opacity:.65;margin-bottom:3px">IB Recommendation</div>
      <div style="font-size:28px;font-weight:800;color:${c.text};letter-spacing:-.5px;line-height:1.1">${action}</div>
    </div>
    <div style="flex:1;min-width:160px">${miniBar(bd.strategic_fit,'Strategic Fit','🎯')}${miniBar(bd.timing_trigger,'Timing','⏰')}${miniBar(bd.access_likelihood,'Access','🔑')}${miniBar(bd.technology_need,'Tech Need','💡')}${miniBar(bd.data_confidence,'Confidence','📊')}</div>
  </div>
  ${b.verdict?`<div style="font-size:13px;color:${c.text};opacity:.9;line-height:1.65;font-style:italic;border-top:1px solid ${c.border}33;padding-top:12px;margin-bottom:12px">"${b.verdict}"</div>`:''}
  ${(b.next_best_action||b.next_step)?`<div style="background:rgba(0,0,0,.35);border:1px solid ${c.border}44;border-radius:8px;padding:11px 14px"><div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:${c.text};opacity:.6;margin-bottom:4px">⚡ Next Best Action</div><div style="font-size:12px;color:#e2e8f0;line-height:1.65">${b.next_best_action||b.next_step}</div></div>`:''}
  </div>`;

  // S_Energy — Financial Signals card
  const sEnergy = energyEst ? card('Financial Signals','💸',
    `<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px">
      <div style="flex:1;min-width:130px;background:#0a0a14;border-radius:8px;padding:12px 14px;border:1px solid #1a3a14">
        <div style="font-size:9px;color:#4ade80;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px">Est. Annual Electricity Cost</div>
        <div style="font-size:20px;font-weight:800;color:#f1f5f9;line-height:1.1">$${Math.round(energyEst.annual_cost_low/1000)}K – $${Math.round(energyEst.annual_cost_high/1000)}K</div>
      </div>
      <div style="flex:1;min-width:130px;background:#0a0a14;border-radius:8px;padding:12px 14px;border:1px solid #1a3a14">
        <div style="font-size:9px;color:#4ade80;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px">BMS Optimization Savings</div>
        <div style="font-size:20px;font-weight:800;color:#4ade80;line-height:1.1">$${Math.round(energyEst.savings_low/1000)}K – $${Math.round(energyEst.savings_high/1000)}K<span style="font-size:11px;color:#64748b;font-weight:400"> /yr</span></div>
      </div>
    </div>
    <div style="font-size:11px;color:#475569;font-style:italic;border-top:1px solid #1e2433;padding-top:8px">📐 ${energyEst.methodology}</div>`
  ) : '';

  // S2 — Why This Property Matters
  const cyberRow = [b.cybersecurity_exposure, vendorEst ? `<span style="display:block;margin-top:6px;padding:6px 10px;background:#1a0a0a;border-radius:5px;border-left:2px solid #f87171;font-size:11px;color:#f87171;font-weight:500">⚠ ${vendorEst.talking_point}</span>` : ''].filter(Boolean).join('');
  const whyDef=[['🔌','Fourth Utility Fit',b.fourth_utility_fit],['🏢','Intellinet Fit',b.intellinet_fit],['💻','Technology Opportunity',b.technology_opportunity],['🔄','New vs Retrofit',b.new_vs_retrofit],['💰','NOI Impact',b.noi_relevance],['🔒','Cybersecurity',cyberRow]].filter(([,,v])=>v);
  const s2=whyDef.length?card('Why This Property Matters','⚡',whyDef.map(([icon,l,v])=>`<div style="padding:9px 0;border-bottom:1px solid #0a0a14"><div style="display:flex;align-items:center;gap:7px;margin-bottom:4px"><span style="font-size:15px">${icon}</span><span style="font-size:11px;color:#94a3b8;font-weight:600;text-transform:uppercase;letter-spacing:.04em">${l}</span></div><div style="font-size:12px;color:#cbd5e1;line-height:1.6;padding-left:22px">${v}</div></div>`).join('')):'';

  // S3 — Timing & Recent Activity
  const triggers=b.trigger_events||[];
  const trigHtml=triggers.map(t=>`<div style="padding:10px 12px;margin-bottom:5px;border-radius:0 6px 6px 0;background:#0a0a14;border-left:3px solid ${urgBorder(t.urgency)}"><div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:3px"><span style="font-size:12px;font-weight:600;color:#e2e8f0;line-height:1.4">${t.event||''}</span>${t.urgency?pill(t.urgency,urgC(t.urgency)):''}</div><div style="font-size:11px;color:#94a3b8;line-height:1.5">${t.significance||''}</div></div>`).join('');
  const newsHtml2=newsItems.map(item=>`<div style="padding:9px 0;border-bottom:1px solid #0a0a14"><div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:2px"><span style="font-size:12px;font-weight:600;color:#e2e8f0;line-height:1.4">${item.headline||''}</span>${item.date?`<span style="font-size:10px;color:#475569;white-space:nowrap;flex-shrink:0">${item.date}</span>`:''}</div><div style="font-size:11px;color:#94a3b8;margin-bottom:3px;line-height:1.5">${item.summary||''}</div>${item.relevance?`<div style="font-size:11px;color:#818cf8;font-style:italic">→ ${item.relevance}</div>`:''}</div>`).join('');
  const noTiming=!triggers.length&&!newsItems.length?`<div style="font-size:12px;color:#475569;padding:6px 0;font-style:italic">No identified timing trigger — outreach must manufacture urgency through lifecycle and risk framing.</div>`:'';
  const s3=card('Timing & Recent Activity','⏰',(triggers.length?`<div style="margin-bottom:${newsItems.length?10:0}px">${trigHtml}</div>`:'')+( newsItems.length?`<div style="font-size:10px;color:#475569;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">📰 Recent News</div>${newsHtml2}`:'')+noTiming);

  // S4 — Ownership & Decision-Maker Map
  const contacts=b.contacts_to_find||[];
  const ctCard=ct=>`<div style="background:#0a0a14;border-radius:8px;padding:11px 12px;margin-bottom:7px;border:1px solid #1a2236"><div style="display:flex;gap:10px;align-items:flex-start"><div style="width:32px;height:32px;border-radius:50%;background:${prioBg(ct.priority||'Primary')};border:1.5px solid ${prioC(ct.priority||'Primary')};display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0">👤</div><div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:2px"><span style="font-size:12px;font-weight:700;color:#e2e8f0">${ct.title||''}</span>${pill(ct.priority||'Primary',prioC(ct.priority||'Primary'))}</div>${ct.company?`<div style="font-size:11px;color:#64748b;margin-bottom:3px">@ ${ct.company}</div>`:''}<div style="font-size:11px;color:#94a3b8;line-height:1.45">${ct.why||''}</div></div></div></div>`;
  const knownCard=c=>`<div style="background:#051a10;border-radius:8px;padding:11px 12px;margin-bottom:7px;border:1px solid #14532d"><div style="display:flex;gap:10px;align-items:flex-start"><div style="width:32px;height:32px;border-radius:50%;background:#052e16;border:1.5px solid #4ade80;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">✓</div><div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:3px"><span style="font-size:12px;font-weight:700;color:#e2e8f0">${c.name||''}</span>${c.source?`<span style="font-size:10px;font-weight:600;color:#4ade80;background:#052e16;border:1px solid #14532d;border-radius:10px;padding:1px 7px">${c.source}</span>`:''}</div>${c.title?`<div style="font-size:11px;color:#94a3b8;margin-bottom:4px">${c.title}</div>`:''}<div style="display:flex;gap:12px;flex-wrap:wrap">${c.email?`<span style="font-size:11px;color:#64748b">✉ ${c.email}</span>`:''}${c.phone?`<span style="font-size:11px;color:#64748b">📞 ${c.phone}</span>`:''}</div></div></div></div>`;
  const s4=card('Ownership & Decision-Maker Map','🏛',
    `<div style="font-size:10px;color:#2dd4bf;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">📋 Verified from ATTOM</div>`+
    drow('Owner Entity',n.owner_entity||'—',FACT)+drow('Mailing Address',n.owner_mailing_address,FACT)+drow('APN',n.apn,FACT)+(bldgLine?drow('Building',bldgLine,FACT):'')+
    (b.ownership_inferred?`<div style="font-size:10px;color:#a78bfa;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-top:14px;margin-bottom:6px">🤖 AI Inference</div>`+drow('Structure',(b.ownership_inferred||'').split('.')[0],INF)+(b.likely_principals?drow('Likely Principals',b.likely_principals,INF):'')+(b.tech_decision_maker?drow('Tech Decision Maker',b.tech_decision_maker,INF):'')+`<div style="margin-top:8px">${pill('Inference Confidence: '+(b.ownership_confidence||'—'),confC(b.ownership_confidence||'Low'))}</div>`:'')+
    (knownContacts.length?`<div style="font-size:10px;color:#4ade80;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-top:14px;margin-bottom:6px">✅ Known Contacts</div>`+knownContacts.map(knownCard).join(''):'')+
    (contacts.length?`<div style="font-size:10px;color:#475569;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-top:${knownContacts.length?14:14}px;margin-bottom:6px">🎯 Roles to Target</div>`+(knownContacts.length?'':`<div style="font-size:11px;color:#64748b;background:#0a0a14;border:1px solid #1e2433;border-radius:6px;padding:8px 10px;margin-bottom:10px;line-height:1.5">💡 No contacts saved yet — open the tracker to run a contact search (HubSpot free · Apollo by request).</div>`)+contacts.map(ctCard).join(''):'' )
  );

  // S5 — Outreach Strategy
  const questions=b.discovery_questions||[];
  const bullets=b.outreach_bullets||[];
  const s5=(b.primary_path||b.message_theme||questions.length)?card('Outreach Strategy','🎯',
    (b.primary_path?`<div style="margin-bottom:10px"><div style="font-size:10px;color:#475569;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px">🚪 Primary Entry Path</div><div style="font-size:12px;color:#cbd5e1;line-height:1.55">${b.primary_path}</div></div>`:'')+
    (b.secondary_path?`<div style="margin-bottom:10px"><div style="font-size:10px;color:#475569;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px">↗ Secondary Path</div><div style="font-size:12px;color:#cbd5e1;line-height:1.55">${b.secondary_path}</div></div>`:'')+
    (b.warm_intro_angle?`<div style="margin-bottom:10px"><div style="font-size:10px;color:#475569;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px">🤝 Warm Intro Angle</div><div style="font-size:12px;color:#cbd5e1;line-height:1.55">${b.warm_intro_angle}</div></div>`:'')+
    (b.message_theme?`<div style="background:#0a0a14;border-left:3px solid #6b48ff;border-radius:0 6px 6px 0;padding:10px 14px;margin-bottom:10px"><div style="font-size:9px;color:#a78bfa;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">💬 Suggested Opening</div><div style="font-size:12px;color:#e2e8f0;line-height:1.65;font-style:italic">"${b.message_theme}"</div></div>`:'')+
    (bullets.length?`<div style="margin-bottom:10px"><div style="font-size:10px;color:#475569;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">📌 Talking Points</div>${bullets.map(ub=>`<div style="font-size:12px;color:#94a3b8;padding:6px 0 6px 14px;border-bottom:1px solid #0a0a14;position:relative;line-height:1.5"><span style="position:absolute;left:0;color:#4ade80;font-weight:700">›</span>${ub}</div>`).join('')}</div>`:'')+
    (questions.length?`<div><div style="font-size:10px;color:#475569;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">❓ Discovery Questions</div>${questions.slice(0,3).map((q,i)=>`<div style="background:#0a0a14;border-radius:7px;padding:10px 12px;margin-bottom:6px;border-left:3px solid #4ade80"><div style="display:flex;gap:8px"><span style="font-size:14px;font-weight:800;color:#4ade80;flex-shrink:0;line-height:1.45">${i+1}.</span><span style="font-size:12px;color:#cbd5e1;line-height:1.55">${q}</span></div></div>`).join('')}</div>`:'' )
  ):'';

  // S6 — Data Quality & Verification
  const risks=b.risk_gaps||[];
  const anomalies=b.asset_anomalies||[];
  const verifyItems=b.verification_needed||[];
  const s6=(risks.length||anomalies.length||verifyItems.length)?card('Data Quality & Verification','⚠️',
    (risks.length?`<div style="font-size:10px;color:#475569;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">Known Data Gaps</div>${risks.map(r=>`<div style="display:flex;gap:10px;padding:8px 0;border-bottom:1px solid #0a0a14;align-items:flex-start">${pill(r.severity||'Medium',sevC(r.severity||'Medium'))}<div><div style="font-size:12px;color:#e2e8f0;margin-bottom:2px">${r.issue||''}</div>${r.implication?`<div style="font-size:11px;color:#64748b">${r.implication}</div>`:''}</div></div>`).join('')}`:'') +
    (anomalies.length?`<div style="font-size:10px;color:#475569;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-top:${risks.length?12:0}px;margin-bottom:6px">Data Anomalies</div>${anomalies.map(a=>`<div style="font-size:11px;color:#fbbf24;padding:5px 0;border-bottom:1px solid #0a0a14">⚠ ${a}</div>`).join('')}`:'') +
    (verifyItems.length?`<div style="font-size:10px;color:#475569;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-top:${risks.length||anomalies.length?12:0}px;margin-bottom:6px">Verify Before Pursuing</div>${verifyItems.map(v=>`<div style="font-size:11px;color:#94a3b8;padding:5px 0 5px 14px;border-bottom:1px solid #0a0a14;position:relative;line-height:1.5"><span style="position:absolute;left:0;color:#f87171">·</span>${v}</div>`).join('')}`:'')
  ,'#78350f66'):'';

  // S7 — Raw Property Data
  const histRows=(n.sales_history||[]).map(s=>`<tr><td style="padding:5px 8px;font-size:11px;color:#94a3b8;border-bottom:1px solid #0a0a14">${s.date||'—'}</td><td style="padding:5px 8px;font-size:11px;color:#94a3b8;border-bottom:1px solid #0a0a14">${s.buyer||'—'}</td><td style="padding:5px 8px;font-size:11px;color:#94a3b8;border-bottom:1px solid #0a0a14">${s.seller||'—'}</td><td style="padding:5px 8px;font-size:11px;color:#94a3b8;border-bottom:1px solid #0a0a14;text-align:right">${s.price?'$'+Number(s.price).toLocaleString():'—'}</td></tr>`).join('');
  const attomGrid=[['Property Type',n.property_type],['Building SF',n.building_sf?Number(n.building_sf).toLocaleString()+' SF':null],['Stories',n.stories],['Year Built',n.year_built],['Lot SF',n.lot_size_sf?Number(n.lot_size_sf).toLocaleString()+' SF':null],['Assessed Value',n.assessed_value?'$'+Number(n.assessed_value).toLocaleString():null],['Last Sale',n.last_sale_date],['Sale Price',n.last_sale_price?'$'+Number(n.last_sale_price).toLocaleString():null],['Price/SF',n.price_per_sf?'$'+n.price_per_sf+'/SF':null],['Disclosure',n.sale_disclosure],['Owner Type',n.owner_type]].filter(([,v])=>v);
  const dimBars=Object.entries({'Strategic Fit':bd.strategic_fit,'Timing / Trigger':bd.timing_trigger,'Access Likelihood':bd.access_likelihood,'Technology Need':bd.technology_need,'Data Confidence':bd.data_confidence}).filter(([,dim])=>dim).map(([l,dim])=>{const p=Math.round(dim.score/dim.max*100),bc=p>=70?'#4ade80':p>=40?'#fbbf24':'#f87171';return`<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px"><span style="color:#94a3b8">${l}</span><span style="color:${bc};font-weight:700">${dim.score}/${dim.max} · ${dim.label||'—'}</span></div><div style="background:#1e2433;border-radius:2px;height:3px"><div style="background:${bc};width:${p}%;height:3px;border-radius:2px"></div></div>${dim.rationale?`<div style="font-size:10px;color:#475569;margin-top:2px">${dim.rationale}</div>`:''}</div>`;}).join('');
  const s7=card('Raw Property Data (ATTOM)','📋',`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:6px;margin-bottom:14px">${attomGrid.map(([l,v])=>`<div style="background:#0a0a14;border-radius:6px;padding:8px"><div style="font-size:9px;color:#475569;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px">${l}</div><div style="font-size:12px;color:#cbd5e1">${v}</div></div>`).join('')}</div>`+(histRows?`<div style="font-size:10px;color:#475569;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">Transaction History</div><table style="width:100%;border-collapse:collapse;margin-bottom:14px"><thead><tr>${['Date','Buyer','Seller','Price'].map(h=>`<th style="text-align:left;font-size:10px;color:#475569;padding:4px 8px;border-bottom:1px solid #1e2433">${h}</th>`).join('')}</tr></thead><tbody>${histRows}</tbody></table>`:`<div style="font-size:11px;color:#475569;margin-bottom:14px">No transaction history in ATTOM.</div>`)+`<div style="font-size:10px;color:#475569;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Score Breakdown</div>${dimBars}`);

  // Storyboard section
  const sBoardHtml = sb ? `<div id="ib-storyboard-panel" style="display:none"><div style="background:#f8fafc;border-radius:12px;padding:22px 20px;margin-bottom:14px;color:#1e293b"><div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:#94a3b8;margin-bottom:14px">📋 Stakeholder Storyboard · Intelligent Buildings</div><div style="font-size:18px;font-weight:800;color:#0f172a;line-height:1.35;margin-bottom:18px;border-left:4px solid #16a34a;padding-left:14px">${sb.opening_hook||''}</div>${[sb.body_p1,sb.body_p2,sb.body_p3].filter(Boolean).map(p=>`<p style="font-size:13px;color:#334155;line-height:1.8;margin-bottom:14px">${p}</p>`).join('')}${sb.call_to_action?`<div style="background:#f0fdf4;border:2px solid #16a34a;border-radius:8px;padding:14px 18px;font-size:13px;font-weight:600;color:#15803d;margin-top:6px">→ ${sb.call_to_action}</div>`:''}<div style="font-size:10px;color:#94a3b8;text-align:right;margin-top:14px;padding-top:10px;border-top:1px solid #e2e8f0">Powered by Intelligent Buildings · intelligentbuildings.com</div></div></div>` : '';
  const toggleScript = sb ? `<script>function ibToggleStoryboard(btn){var bd=document.getElementById('ib-bd-panel');var sb=document.getElementById('ib-storyboard-panel');var on=sb.style.display==='none';sb.style.display=on?'block':'none';bd.style.display=on?'none':'block';btn.textContent=on?'📊 BD Report':'📋 Storyboard';}<\/script>` : '';

  const header=`<div style="background:#16a34a18;border:1px solid #16a34a33;border-radius:8px;padding:8px 12px;font-size:11px;color:#4ade80;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px"><span>🔭 IB Scout · Property Intelligence</span><span style="color:#475569">ATTOM: detail=${d.attom_raw?.detail_found||false} · sale=${d.attom_raw?.sale_found||false}</span></div><h1 style="font-size:20px;font-weight:700;color:#f1f5f9;margin-bottom:6px">${d.formatted_address||address||'—'}</h1><div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px">${statChips}</div>`;

  return '<style>@media print{.ib-no-print{display:none!important}html,body{background:#fff!important;color:#111!important;padding:12px!important;margin:0!important}*{background:transparent!important;color:#111!important;border-color:#ddd!important;box-shadow:none!important;text-shadow:none!important}.ib-card{background:#f8f9fa!important;border:1px solid #e2e8f0!important;break-inside:avoid;page-break-inside:avoid}.ib-s1{background:#f0f5f0!important;border:2px solid #aaa!important;break-inside:avoid;page-break-inside:avoid}h1{color:#000!important;font-size:18px!important}}</style>'+toggleScript+header+sBoardHtml+`<div id="ib-bd-panel">`+sEnergy+s1+s2+s3+s4+s5+s6+s7+`<div style="font-size:10px;color:#334155;text-align:right;margin-top:12px;padding-top:8px;border-top:1px solid #1e2433">Powered by Attom Data · Intelligent Buildings</div></div>`;
}

function renderV2(row, knownContacts) {
  const d = row.scout_brief;
  const dateStr = row.scout_brief_at ? new Date(row.scout_brief_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '';
  document.title = `IB Scout — ${d.formatted_address || row.address}`;
  document.getElementById('root').innerHTML = buildScoutHtml(d, row.address, dateStr, knownContacts || []);
  // Share + Print button bar (standalone share page only)
  const shareUrl = window.location.href;
  const bar = document.createElement('div');
  bar.className = 'ib-no-print';
  const btnS = 'display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:18px;font-size:12px;font-weight:600;cursor:pointer;font-family:system-ui,sans-serif;text-decoration:none;white-space:nowrap';
  bar.style.cssText = 'position:fixed;top:12px;right:14px;z-index:9999;display:flex;gap:8px;';
  const hasSb = !!row.scout_brief?.brief?.storyboard;
  bar.innerHTML = `${hasSb?`<button onclick="ibToggleStoryboard(this)" style="${btnS};border:1px solid rgba(168,85,247,0.4);background:rgba(168,85,247,0.1);backdrop-filter:blur(8px);color:#c084fc">📋 Storyboard</button>`:''}` +
    `<button onclick="navigator.clipboard.writeText(window.location.href).then(()=>{this.textContent='✓ Copied!';setTimeout(()=>this.textContent='🔗 Share',2000)}).catch(()=>prompt('Copy link:',window.location.href))" style="${btnS};border:1px solid rgba(74,222,128,0.5);background:rgba(5,46,22,0.9);backdrop-filter:blur(8px);color:#4ade80">🔗 Share</button><button onclick="window.print()" style="${btnS};border:1px solid rgba(148,163,184,0.3);background:rgba(10,10,20,0.85);backdrop-filter:blur(8px);color:#94a3b8">🖨 PDF</button>`;
  document.body.appendChild(bar);
}


function showError(msg) {
  document.getElementById('root').innerHTML = `<div class="error"><h2 style="margin-bottom:12px">⚠️ Report Unavailable</h2><p style="color:#94a3b8;font-size:13px">${msg}</p></div>`;
}

load();
</script>
</body>
</html>
