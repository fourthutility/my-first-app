<script>
// NC SOS search — copies cleaned name to clipboard, opens search page in new tab
// (NC SOS uses Cloudflare + session cookies; auto-submit can't work cross-origin)
function sosSearch(entityName) {
  const term = (entityName||'').replace(/\s+(LLC|LP|L\.P\.|LLP|LLLP|Inc\.?|Corp\.?|Co\.?|Ltd\.?|PLLC)\s*$/i,'').replace(/\s+(Properties|Property|Holdings|Realty|Ventures|Group)\s*$/i,'').trim() || entityName || '';
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(term).catch(()=>{});
  }
  const note = document.createElement('div');
  note.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#e8e8f0;padding:10px 20px;border-radius:8px;font-size:13px;z-index:99999;box-shadow:0 4px 16px rgba(0,0,0,.5);pointer-events:none';
  note.textContent = '📋 Copied! In the NC SOS tab, paste (⌘V or Ctrl+V) and hit Search → ' + term;
  document.body.appendChild(note);
  setTimeout(() => note.remove(), 5000);
  window.open('https://www.sosnc.gov/online_services/search/by_title/search_Business_Registration', '_blank');
}

// ── Contact enrichment globals (defined here so innerHTML injection isn't needed) ──
function _ibEnrichCfg(){var w=document.getElementById('ibEnrichWrap');return w?w.dataset:{};}
function ibEnrichShow(){document.getElementById('ibEnrichTrigger').style.display='none';document.getElementById('ibEnrichPanel').style.display='block';var inp=document.getElementById('ibEnrichCompany');if(inp&&!inp.value)inp.value=_ibEnrichCfg().company||'';}
function ibEnrichCancel(){document.getElementById('ibEnrichPanel').style.display='none';document.getElementById('ibEnrichTrigger').style.display='block';}
async function ibEnrichSearch(){
  var cfg=_ibEnrichCfg(),company=document.getElementById('ibEnrichCompany').value.trim();
  if(!company){alert('Enter a company name first');return;}
  var btn=document.getElementById('ibEnrichSearchBtn');btn.disabled=true;btn.textContent='Searching...';
  document.getElementById('ibEnrichResults').innerHTML='<div style="text-align:center;padding:16px;color:#475569;font-size:12px">Checking HubSpot then Apollo...</div>';
  try{
    var res=await fetch(cfg.url,{method:'POST',headers:{'Content-Type':'application/json','x-app-secret':cfg.secret},body:JSON.stringify({action:'search',project_id:cfg.pid,company_name:company})});
    var data=await res.json();
    if(!res.ok){document.getElementById('ibEnrichResults').innerHTML='<div style="color:#f87171;font-size:12px;padding:8px">Search failed ('+res.status+'): '+(data.error||'Server error')+'</div>';return;}
    ibEnrichRenderSearch(data,company);
  }catch(e){document.getElementById('ibEnrichResults').innerHTML='<div style="color:#f87171;font-size:12px;padding:8px">Search failed: '+e.message+'</div>';}
  finally{btn.disabled=false;btn.textContent='Run Free Search →';}
}
function ibEnrichRenderSearch(data,company){
  var html='';
  if(data.hubspot&&data.hubspot.length){
    html+='<div style="font-size:10px;color:#4ade80;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">✅ HubSpot ('+data.hubspot.length+')</div>';
    data.hubspot.forEach(function(c){html+='<div style="background:#051207;border-radius:6px;padding:8px 10px;margin-bottom:5px;border:1px solid #14532d"><div style="font-size:12px;font-weight:700;color:#e2e8f0">'+c.name+(c.title?' · <span style="color:#94a3b8;font-weight:400">'+c.title+'</span>':'')+'</div>'+(c.email?'<div style="font-size:11px;color:#64748b">✉ '+c.email+'</div>':'')+(c.phone?'<div style="font-size:11px;color:#64748b">📞 '+c.phone+'</div>':'')+'</div>';});
  } else { html+='<div style="font-size:11px;color:#475569;margin-bottom:8px">HubSpot: no matches</div>'; }
  if(data.apollo&&data.apollo.length){
    html+='<div style="font-size:10px;color:#94a3b8;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin:10px 0 6px">Apollo: '+data.apollo.length+' found — select to reveal</div>';
    html+='<div id="ibApolloList">';
    data.apollo.forEach(function(c,i){html+='<label style="display:flex;align-items:flex-start;gap:8px;padding:8px;background:#0a0a14;border-radius:6px;margin-bottom:4px;cursor:pointer"><input type="checkbox" data-id="'+(c.apollo_id||'')+'" data-name="'+c.name.replace(/"/g,'&quot;')+'" data-company="'+(c.company||company).replace(/"/g,'&quot;')+'" data-title="'+(c.title||'').replace(/"/g,'&quot;')+'" onchange="ibEnrichUpdateBtn()" style="margin-top:2px;accent-color:#4ade80"><div><div style="font-size:12px;color:#e2e8f0">'+c.name+'</div>'+(c.title?'<div style="font-size:11px;color:#475569">'+c.title+'</div>':'')+(c.linkedin_url?'<a href="'+c.linkedin_url+'" target="_blank" style="font-size:11px;color:#818cf8">LinkedIn →</a>':'')+'</div></label>';});
    html+='</div>';
    html+='<div style="margin-top:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap"><button id="ibRevealBtn" onclick="ibEnrichReveal()" disabled style="padding:7px 14px;border-radius:18px;font-size:12px;font-weight:600;background:#052e16;border:1px solid #166534;color:#94a3b8;cursor:pointer">Reveal selected — 0 credits</button><span style="font-size:10px;color:#475569">1 Apollo credit per contact</span></div>';
  } else if(!data.hubspot||!data.hubspot.length){ html+='<div style="font-size:11px;color:#475569">No contacts found. Try a different company name.</div>'; }
  document.getElementById('ibEnrichResults').innerHTML=html;
  window._ibApolloData=data.apollo||[];
}
function ibEnrichUpdateBtn(){
  var n=document.querySelectorAll('#ibApolloList input:checked').length,btn=document.getElementById('ibRevealBtn');
  if(!btn)return;btn.disabled=n===0;btn.style.color=n?'#4ade80':'#94a3b8';
  btn.textContent='Reveal selected — '+n+' credit'+(n!==1?'s':'');
}
async function ibEnrichReveal(){
  var cfg=_ibEnrichCfg(),checked=Array.from(document.querySelectorAll('#ibApolloList input:checked'));
  if(!checked.length)return;
  var count=checked.length;
  var singleNames=checked.filter(function(i){return i.dataset.singleName==='1';}).map(function(i){return i.dataset.name;});
  var msg='Use '+count+' Apollo credit'+(count!==1?'s':'')+' to reveal contact info for '+count+' person'+(count!==1?'s':'')+'.';
  if(singleNames.length){msg+='\n\n⚠ Warning: '+singleNames.join(', ')+' '+(singleNames.length===1?'has':'have')+' only a first name — reveal will likely return nothing and the credit will still be charged.';}
  msg+='\n\nContinue?';
  if(!confirm(msg))return;
  var btn=document.getElementById('ibRevealBtn');btn.disabled=true;btn.textContent='Revealing...';
  var selections=checked.map(function(i){return{apollo_id:i.dataset.id,name:i.dataset.name,company:i.dataset.company};});
  var titles={};checked.forEach(function(i){titles[i.dataset.id]=i.dataset.title;});
  try{
    var res=await fetch(cfg.url,{method:'POST',headers:{'Content-Type':'application/json','x-app-secret':cfg.secret},body:JSON.stringify({action:'reveal',project_id:cfg.pid,selections:selections,titles:titles})});
    var data=await res.json();ibEnrichRenderRevealed(data.revealed||[],data.credits_used||0);
  }catch(e){btn.disabled=false;btn.textContent='Retry';alert('Reveal failed: '+e.message);}
}
function ibEnrichRenderRevealed(contacts,credits){
  var list=document.getElementById('ibApolloList');
  if(list){var html='<div style="font-size:10px;color:#4ade80;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">✅ Revealed ('+credits+' credit'+(credits!==1?'s':'')+' used)</div>';contacts.forEach(function(c){var hasInfo=c.email||c.phone||c.linkedin_url;var bg=hasInfo?'#051207':'#0a0a14';var border=hasInfo?'#14532d':'#334155';html+='<div style="background:'+bg+';border-radius:6px;padding:8px 10px;margin-bottom:5px;border:1px solid '+border+'"><div style="font-size:12px;font-weight:700;color:#e2e8f0">'+c.name+(c.title?' · <span style="color:#94a3b8;font-weight:400">'+c.title+'</span>':'')+(hasInfo?'':'<span style="font-size:10px;color:#fbbf24;margin-left:6px">no info found</span>')+'</div>'+(c.email?'<div style="font-size:11px;color:#64748b">✉ '+c.email+'</div>':'')+(c.phone?'<div style="font-size:11px;color:#64748b">📞 '+c.phone+'</div>':'')+(c.linkedin_url?'<a href="'+c.linkedin_url+'" target="_blank" style="font-size:11px;color:#818cf8">LinkedIn →</a>':'')+'</div>';});list.outerHTML=html;}
  var empty=contacts.filter(function(c){return !c.email&&!c.phone&&!c.linkedin_url;}).length;
  var rb=document.getElementById('ibRevealBtn');if(rb&&rb.parentElement)rb.parentElement.innerHTML='<div style="font-size:11px;color:#4ade80;margin-top:4px">✓ Contacts saved to report'+(empty?' <span style="color:#fbbf24">('+empty+' returned no info — not saved)</span>':'')+'</div>';
}

const SUPABASE_URL = 'https://lnldwxttyfjmaobluciy.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxubGR3eHR0eWZqbWFvYmx1Y2l5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMDI4ODksImV4cCI6MjA5MTg3ODg4OX0.W0ujmEJpBqKJcMYdwd__bJ0yszSG5QGBfqwFl7hZdLc';
const SCOUT_API   = 'https://lnldwxttyfjmaobluciy.supabase.co/functions/v1/ib-scout';

async function fetchKnownContacts(projectId) {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/contacts?project_id=eq.${projectId}&select=name,title,email,phone,source,linkedin_url&order=name.asc`,
      { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } }
    );
    if (!res.ok) return [];
    return await res.json() || [];
  } catch(e) { return []; }
}

async function load() {
  const params = new URLSearchParams(location.search);
  const projectId = params.get('project');
  if (!projectId) { showError('No project ID in URL.'); return; }

  // 1. Try localStorage first (instant, no network — works on originating device)
  try {
    const cached = localStorage.getItem('ib_scout_brief_' + projectId);
    if (cached) {
      const data = JSON.parse(cached);
      if (data?.brief) {
        const knownContacts = await fetchKnownContacts(projectId);
        render({ scout_brief: data.brief, scout_brief_at: data.at, address: data.address }, knownContacts);
        return;
      }
    }
  } catch(e) { /* localStorage unavailable, fall through */ }

  // 2. Try direct Supabase read (anon key — works if RLS allows public SELECT)
  try {
    const [briefRes, contacts] = await Promise.all([
      fetch(`${SUPABASE_URL}/rest/v1/projects?id=eq.${projectId}&select=address,property_name,scout_brief,scout_brief_at,owner_developer,limited_partners`,
        { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } }),
      fetchKnownContacts(projectId),
    ]);
    const rows = await briefRes.json();
    if (rows?.length && rows[0].scout_brief) { render(rows[0], contacts); return; }
  } catch(e) { /* RLS may be blocking — fall through to edge function */ }

  // 3. Fall back to edge function GET (service role key — always bypasses RLS)
  try {
    const [res, contacts] = await Promise.all([
      fetch(`${SCOUT_API}?project_id=${projectId}`),
      fetchKnownContacts(projectId),
    ]);
    if (res.ok) {
      const row = await res.json();
      if (row?.scout_brief) { render(row, contacts); return; }
    }
  } catch(e) { /* fall through to error */ }

  showError('No IB Scout report found for this property. Run IB Scout first, then share the link.');
}

function fmt(v) { return v != null ? String(v) : '—'; }
function fmtPrice(v) { return v ? '$' + Number(v).toLocaleString() : '—'; }
function fmtSF(v) { return v ? Number(v).toLocaleString() + ' SF' : '—'; }

function setPageMeta(address) {
  const title = address ? `IB Scout — ${address}` : 'IB Scout Report';
  const desc  = address ? `Property intelligence report for ${address} · Intelligent Buildings` : 'Property intelligence report by Intelligent Buildings';
  document.title = title;
  document.querySelector('meta[property="og:title"]')?.setAttribute('content', title);
  document.querySelector('meta[property="og:description"]')?.setAttribute('content', desc);
  document.querySelector('meta[name="twitter:title"]')?.setAttribute('content', title);
  document.querySelector('meta[name="twitter:description"]')?.setAttribute('content', desc);
  document.querySelector('meta[name="description"]')?.setAttribute('content', desc);
}

function render(row, knownContacts) {
  const d = row.scout_brief;
  // Route to v2 renderer
  if (d.schema_version === 2 || d.pursuit_score || d.brief?.schema_version === 2 || d.brief?.verdict) { renderV2(row, knownContacts || []); return; }
  const n = d.normalized || {};
  const b = d.brief || {};
  const scoreColor = d.score >= 70 ? '#4ade80' : d.score >= 40 ? '#facc15' : '#94a3b8';
  const priorityBg = d.score >= 70 ? '#052e16' : d.score >= 40 ? '#422006' : '#0f172a';
  const dateStr = row.scout_brief_at
    ? new Date(row.scout_brief_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})
    : '';

  setPageMeta(d.formatted_address || row.address);

  const historyRows = (n.sales_history || []).map(s => `
    <tr><td>${s.date||'—'}</td><td>${s.buyer||'—'}</td><td>${s.seller||'—'}</td>
    <td style="text-align:right">${s.price?'$'+Number(s.price).toLocaleString():'—'}</td></tr>`).join('');

  const companiesHtml = (b.companies || []).map(co => {
    const contacts = (co.contacts_to_find || []).map(c =>
      `<div class="contact-chip"><span style="color:#a78bfa;font-weight:600">${c.title}</span>
       <span style="color:#475569"> — ${c.why}</span></div>`).join('');
    return `<div class="company-card">
      <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:6px">
        <span style="font-size:14px;font-weight:700;color:#f1f5f9">${co.company||'—'}</span>
        <span style="font-size:11px;color:#4ade80;background:#052e16;padding:2px 7px;border-radius:4px">${co.role||''}</span>
      </div>
      ${co.angle?`<p style="font-size:12px;color:#94a3b8;font-style:italic;margin-bottom:6px">"${co.angle}"</p>`:''}
      <div style="font-size:10px;color:#475569;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Contacts to find</div>
      ${contacts}</div>`;
  }).join('');

  const itHtml = b.it_contact ? `
    <div style="padding:14px;background:#0a0a14;border:1px solid #1e1a3a;border-radius:8px;margin-top:10px">
      <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:6px">
        <span style="font-size:13px;font-weight:700;color:#f1f5f9">${b.it_contact.likely_company||'Unknown'}</span>
        <span style="font-size:11px;color:#a78bfa;background:#1e1a3a;padding:2px 7px;border-radius:4px">IT / Technology</span>
      </div>
      ${b.it_contact.angle?`<p style="font-size:12px;color:#94a3b8;font-style:italic;margin-bottom:6px">"${b.it_contact.angle}"</p>`:''}
      <div style="font-size:11px;color:#475569">Titles: ${(b.it_contact.titles_to_find||[]).join(' · ')}</div>
    </div>` : '';

  const questionsHtml = (b.discovery_questions||[]).map((q,i) =>
    `<div class="q-row"><span style="color:#4ade80;font-weight:700;min-width:18px">${i+1}.</span><span>${q}</span></div>`
  ).join('');

  document.getElementById('root').innerHTML = `
    <div style="background:#16a34a18;border:1px solid #16a34a33;border-radius:8px;padding:8px 14px;font-size:11px;color:#4ade80;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
      <span style="display:flex;align-items:center;gap:6px">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/><path d="M11 8v3l2 2"/></svg>
        IB Scout · Attom + AI · ${dateStr}
      </span>
      <span style="color:#475569">detail=${d.attom_raw?.detail_found} · sale=${d.attom_raw?.sale_found} · ${d.attom_raw?.history_count||0} transactions</span>
    </div>

    <h1>${d.formatted_address || row.address}</h1>
    <div class="meta">${n.property_type||''} · ${n.building_sf?Number(n.building_sf).toLocaleString()+' SF':''} · Built ${n.year_built||'?'} · ${n.stories||'?'} stories</div>

    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap">
      <div class="badge" style="background:${priorityBg};border:2px solid ${scoreColor}55">
        <span style="font-size:36px;font-weight:800;color:${scoreColor};line-height:1">${d.score}</span>
        <div style="display:flex;flex-direction:column;gap:1px">
          <span style="font-size:9px;color:${scoreColor};opacity:0.6;text-transform:uppercase;letter-spacing:.1em;font-weight:700">IB Scout Score</span>
          <span style="font-size:15px;font-weight:700;color:${scoreColor}">${d.priority}</span>
        </div>
      </div>
      ${b.next_step?`<div style="flex:1;min-width:200px;padding:10px 14px;background:#0f1117;border:1px solid #1e2433;border-radius:10px;font-size:12px;color:#cbd5e1"><span style="color:#4ade80;font-weight:700">Next step: </span>${b.next_step}</div>`:''}
    </div>

    ${companiesHtml||itHtml?`<div class="card">
      <div class="card-title">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Who to Contact
      </div>
      ${companiesHtml}${itHtml}
    </div>`:''}

    <div class="card">
      <div class="card-title">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Intelligence Report
      </div>
      <div class="report">${(b.report||'').replace(/</g,'&lt;')}</div>
    </div>

    ${questionsHtml?`<div class="card">
      <div class="card-title">Discovery Questions</div>
      ${questionsHtml}
    </div>`:''}

    <div class="card">
      <div class="card-title">🏢 Ownership & Building</div>
      <div class="grid2">
        <div class="field"><label>Owner Entity</label><span>${fmt(n.owner_entity)}</span></div>

function renderV2(row, knownContacts) {

  if (row.owner_developer) d._gp = row.owner_developer;
  if (row.limited_partners) d._lps = Array.isArray(row.limited_partners) ? row.limited_partners : [row.limited_partners];

  setPageMeta(d.formatted_address || row.address);
  const projectId = new URLSearchParams(location.search).get('project') || row.id || '';
  document.getElementById('root').innerHTML = buildScoutHtml(d, row.address, dateStr, knownContacts || [], projectId);
  // innerHTML doesn't execute injected <script> tags — re-run them manually
  document.querySelectorAll('#root script').forEach(old => {
    const s = document.createElement('script');
    s.textContent = old.textContent;
    old.replaceWith(s);
  });
  // Share page: storyboard is default view, BD report is secondary
  const hasSb = !!(row.scout_brief?.brief?.storyboard);
  if (hasSb) {
    const bdPanel = document.getElementById('ib-bd-panel');
    if (bdPanel) bdPanel.style.display = 'none';
  }
  // Share + Print button bar (standalone share page only)
  const shareUrl = window.location.href;
  const bar = document.createElement('div');
  bar.className = 'ib-no-print';
  const btnS = 'display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:18px;font-size:12px;font-weight:600;cursor:pointer;font-family:system-ui,sans-serif;text-decoration:none;white-space:nowrap';
  bar.style.cssText = 'position:fixed;top:12px;right:14px;z-index:9999;display:flex;gap:8px;';
  bar.innerHTML = `${hasSb?`<button onclick="ibToggleStoryboard(this)" style="${btnS};border:1px solid rgba(168,85,247,0.4);background:rgba(168,85,247,0.1);backdrop-filter:blur(8px);color:#c084fc">📊 BD Report</button>`:''}` +
    `<button onclick="navigator.clipboard.writeText(window.location.href).then(()=>{this.textContent='✓ Copied!';setTimeout(()=>this.textContent='🔗 Share',2000)}).catch(()=>prompt('Copy link:',window.location.href))" style="${btnS};border:1px solid rgba(74,222,128,0.5);background:rgba(5,46,22,0.9);backdrop-filter:blur(8px);color:#4ade80">🔗 Share</button><button onclick="window.print()" style="${btnS};border:1px solid rgba(148,163,184,0.3);background:rgba(10,10,20,0.85);backdrop-filter:blur(8px);color:#94a3b8">🖨 PDF</button>`;
  document.body.appendChild(bar);
}
