name: Playwright Tests

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Where to run tests'
        type: choice
        options:
          - production
          - preview
          default: production
         preview_pr_number:
           description: 'PR number (only if target=preview)'
           required: false 

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Set base URL
        run: |
          if [ "${{ inputs.target }}" = "preview" ]; then
            DEPLOY_URL="https://deploy-preview-${{ inputs.preview_pr_number }}--ibscout.netlify.app"
            echo "Waiting for $DEPLOY_URL..."
            npx wait-on $DEPLOY_URL --timeout 120000 --interval 5000
            echo "PLAYWRIGHT_BASE_URL=$DEPLOY_URL" >> $GITHUB_ENV
          else
            echo "PLAYWRIGHT_BASE_URL=https://ibscout.netlify.app" >> $GITHUB_ENV
          fi

      # On manual dispatch, derive URL from inputs (production or PR preview)
      - name: Set URL (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ inputs.target }}" = "preview" ]; then
            DEPLOY_URL="https://deploy-preview-${{ inputs.preview_pr_number }}--ibscout.netlify.app"
            echo "Waiting for $DEPLOY_URL..."
            npx wait-on $DEPLOY_URL --timeout 120000 --interval 5000
            echo "PLAYWRIGHT_BASE_URL=$DEPLOY_URL" >> $GITHUB_ENV
          else
            echo "PLAYWRIGHT_BASE_URL=https://ibscout.netlify.app" >> $GITHUB_ENV
          fi

      - name: Run Playwright tests
        run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: ${{ env.PLAYWRIGHT_BASE_URL }}
          # Auth0 Password Grant credentials for the test user.
          # Set these as repository secrets:
          #   Settings → Secrets and variables → Actions → New repository secret
          SCOUT_TEST_EMAIL: ${{ secrets.SCOUT_TEST_EMAIL }}
          SCOUT_TEST_PASSWORD: ${{ secrets.SCOUT_TEST_PASSWORD }}

      - name: Upload test report on failure
        uses: actions/upload-artifact@v5
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7