name: Playwright Tests

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Where to run tests'
        type: choice
        options:
          - production
          - preview
        default: production
      preview_pr_number:
        description: 'PR number (only if target=preview)'
        required: false

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Set base URL
        run: |
          if [ "${{ inputs.target }}" = "preview" ]; then
            DEPLOY_URL="https://deploy-preview-${{ inputs.preview_pr_number }}--ibscout.netlify.app"
            echo "Waiting for $DEPLOY_URL..."
            npx wait-on $DEPLOY_URL --timeout 120000 --interval 5000
            echo "PLAYWRIGHT_BASE_URL=$DEPLOY_URL" >> $GITHUB_ENV
          else
            echo "PLAYWRIGHT_BASE_URL=https://ibscout.netlify.app" >> $GITHUB_ENV
          fi

      - name: Run Playwright tests
        run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: ${{ env.PLAYWRIGHT_BASE_URL }}

      - name: Upload test report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7