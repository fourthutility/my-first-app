name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      # On a PR, test against the Netlify deploy preview for that PR number
      - name: Set deploy preview URL (PR)
        if: github.event_name == 'pull_request'
        run: |
          DEPLOY_URL="https://deploy-preview-${{ github.event.pull_request.number }}--ibscout.netlify.app"
          echo "Waiting for $DEPLOY_URL..."
          npx wait-on $DEPLOY_URL --timeout 120000 --interval 5000
          echo "PLAYWRIGHT_BASE_URL=$DEPLOY_URL" >> $GITHUB_ENV

      # On push to main, test against production
      - name: Set production URL (push to main)
        if: github.event_name == 'push'
        run: echo "PLAYWRIGHT_BASE_URL=https://ibscout.netlify.app" >> $GITHUB_ENV

      - name: Run Playwright tests
        run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: ${{ env.PLAYWRIGHT_BASE_URL }}
          # Auth0 Password Grant credentials for the test user.
          # Set these as repository secrets:
          #   Settings → Secrets and variables → Actions → New repository secret
          SCOUT_TEST_EMAIL: ${{ secrets.SCOUT_TEST_EMAIL }}
          SCOUT_TEST_PASSWORD: ${{ secrets.SCOUT_TEST_PASSWORD }}

      - name: Upload test report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
